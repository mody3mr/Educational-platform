<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المتفوقين التعليمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-sky-500 selection:text-slate-950">

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin"></div>
                <p class="text-slate-400 font-medium">جاري تحميل المنصة...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, updateDoc, arrayUnion, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqapVeFxYyLJWryfqJrwBBmaIFcsCLn-w",
            authDomain: "educational-platform-f5e7e.firebaseapp.com",
            projectId: "educational-platform-f5e7e",
            storageBucket: "educational-platform-f5e7e.firebasestorage.app",
            messagingSenderId: "284103839814",
            appId: "1:284103839814:web:9b6abd761a585c46f03a47"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appDiv = document.getElementById('app');

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userDocRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userDocRef);
                if (userSnap.exists()) {
                    renderDashboard(user, userSnap.data());
                } else {
                    renderProfileForm(user);
                }
            } else {
                renderAuth();
            }
        });

        function renderAuth() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6">
                    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                        <div class="text-center mb-6">
                            <h1 class="text-2xl font-black text-white">تسجيل الدخول للمنصة</h1>
                            <p class="text-slate-400 text-sm mt-1">أدخل بريدك وكلمة المرور للمتابعة</p>
                        </div>
                        <form id="auth-form" class="space-y-4">
                            <input type="email" id="email" required placeholder="البريد الإلكتروني" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <input type="password" id="password" required placeholder="كلمة المرور (6 أحرف فأكثر)" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">دخول / إنشاء حساب</button>
                        </form>
                        <div id="err" class="text-rose-400 text-xs mt-3 text-center font-bold"></div>
                    </div>
                </div>
            `;
            document.getElementById('auth-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const pass = document.getElementById('password').value;
                try {
                    await signInWithEmailAndPassword(auth, email, pass);
                } catch {
                    try {
                        await createUserWithEmailAndPassword(auth, email, pass);
                    } catch (err) {
                        document.getElementById('err').innerText = "حدث خطأ في التسجيل، تأكد من صحة البيانات.";
                    }
                }
            });
        }

        function renderProfileForm(user) {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6">
                    <div class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                        <h2 class="text-2xl font-black text-white mb-2">استكمال بيانات الطالب</h2>
                        <p class="text-slate-400 text-sm mb-6">هذه الخطوة تطلب مرة واحدة فقط.</p>
                        <form id="profile-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="fullName" required placeholder="الاسم الرباعي" class="md:col-span-2 bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="tel" id="studentPhone" required placeholder="رقم هاتف الطالب" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="tel" id="fatherPhone" required placeholder="رقم هاتف الأب" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="tel" id="motherPhone" required placeholder="رقم هاتف الأم" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="text" id="school" required placeholder="اسم المدرسة" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="text" id="governorate" required placeholder="المحافظة" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <select id="academicYear" class="md:col-span-2 bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                <option value="first">الصف الأول الثانوي</option>
                                <option value="second">الصف الثاني الثانوي</option>
                                <option value="third">الصف الثالث الثانوي</option>
                            </select>
                            <button type="submit" class="md:col-span-2 bg-sky-500 text-slate-950 font-bold py-3.5 rounded-xl">حفظ ودخول المنصة</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('profile-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = {
                    fullName: document.getElementById('fullName').value,
                    studentPhone: document.getElementById('studentPhone').value,
                    fatherPhone: document.getElementById('fatherPhone').value,
                    motherPhone: document.getElementById('motherPhone').value,
                    school: document.getElementById('school').value,
                    governorate: document.getElementById('governorate').value,
                    academicYear: document.getElementById('academicYear').value,
                    unlockedCourses: []
                };
                await setDoc(doc(db, "users", user.uid), data);
                renderDashboard(user, data);
            });
        }

        async function renderDashboard(user, userData) {
            appDiv.innerHTML = `
                <div class="min-h-screen flex flex-col md:flex-row">
                    <!-- القائمة الجانبية -->
                    <aside class="w-full md:w-72 bg-slate-900 border-l border-slate-800 p-6 hidden md:flex flex-col justify-between">
                        <div>
                            <div class="flex items-center gap-3 mb-10 px-2">
                                <div class="w-10 h-10 bg-sky-500 text-slate-950 rounded-xl flex items-center justify-center font-bold">
                                    <i class="fa-solid fa-graduation-cap"></i>
                                </div>
                                <div>
                                    <h1 class="font-bold text-white text-sm">منصة المتفوقين</h1>
                                    <span class="text-xs text-sky-400">بوابة الطالب الذكية</span>
                                </div>
                            </div>
                            <nav class="space-y-2">
                                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold bg-sky-500 text-slate-950">
                                    <i class="fa-solid fa-play-circle"></i> كورساتي المفعلة
                                </a>
                                <a href="#" onclick="alert('قسم الاختبارات قادم قريبأً!')" class="flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-slate-400 hover:bg-slate-800">
                                    <i class="fa-solid fa-clipboard-question"></i> الاختبارات والواجبات
                                </a>
                            </nav>
                        </div>
                    </aside>

                    <!-- المحتوى -->
                    <main class="flex-1 p-6 md:p-10 overflow-y-auto">
                        <header class="flex justify-between items-center mb-8 pb-6 border-b border-slate-800">
                            <div>
                                <h2 class="text-2xl md:text-3xl font-black text-white">مرحباً، ${userData.fullName} 👋</h2>
                                <p class="text-slate-400 text-sm mt-1">السنة الدراسية: <span class="text-sky-400 font-bold">${userData.academicYear === 'third' ? 'الصف الثالث الثانوي' : userData.academicYear === 'second' ? 'الصف الثاني الثانوي' : 'الصف الأول الثانوي'}</span></p>
                            </div>
                            <button id="logout-btn" class="bg-rose-500/10 text-rose-400 px-4 py-2 rounded-xl text-xs font-bold">تسجيل الخروج</button>
                        </header>

                        <!-- حاوية عرض المحاضرات أو التشغيل -->
                        <div id="dynamic-area">
                            <h3 class="text-xl font-bold text-white mb-4">المحاضرات المتاحة لسنتك الدراسية</h3>
                            <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <p class="text-slate-400">جاري التحميل...</p>
                            </div>
                        </div>
                    </main>
                </div>
            `;

            document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
            loadStudentCourses(userData, user.uid);
        }

        async function loadStudentCourses(userData, userId) {
            const grid = document.getElementById('courses-grid');
            try {
                const querySnapshot = await getDocs(collection(db, "courses"));
                let html = '';
                
                querySnapshot.forEach((docSnap) => {
                    const c = docSnap.data();
                    const courseId = docSnap.id;
                    const isUnlocked = userData.unlockedCourses && userData.unlockedCourses.includes(courseId);

                    // فلترة حسب سنة الطالب
                    if (c.academicYear === userData.academicYear) {
                        html += `
                            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 flex flex-col justify-between shadow-xl">
                                <div>
                                    <span class="text-xs bg-sky-500/10 text-sky-400 px-3 py-1 rounded-xl font-bold">${c.subject}</span>
                                    <h3 class="text-lg font-bold text-white mt-3">${c.title}</h3>
                                    <p class="text-slate-400 text-sm mt-2 line-clamp-2">${c.description}</p>
                                </div>
                                <div class="mt-6">
                                    ${isUnlocked ? `
                                        <button onclick="window.watchLesson('${c.title}', '${c.videoUrl}', '${c.description}')" class="w-full bg-emerald-500 text-slate-950 font-extrabold py-3 rounded-xl flex items-center justify-center gap-2">
                                            <i class="fa-solid fa-play"></i> مشاهدة المحاضرة
                                        </button>
                                    ` : `
                                        <button onclick="window.promptActivation('${courseId}', '${userId}')" class="w-full bg-amber-500/10 border border-amber-500/30 text-amber-400 font-extrabold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-amber-500 hover:text-slate-950 transition">
                                            <i class="fa-solid fa-lock"></i> أدخل كود التفعيل
                                        </button>
                                    `}
                                </div>
                            </div>
                        `;
                    }
                });
                grid.innerHTML = html || '<p class="text-slate-400">لا توجد محاضرات مضافة لسنتك الدراسية حالياً.</p>';
            } catch (err) {
                grid.innerHTML = '<p class="text-rose-400">حدث خطأ في تحميل المحاضرات.</p>';
            }
        }

        // نافذة تفعيل الكود للطالب
        window.promptActivation = async function(courseId, userId) {
            const code = prompt("أدخل كود التفعيل الخاص بهذه المحاضرة:");
            if (!code) return;

            // البحث عن الكود في قاعدة البيانات
            const codesRef = collection(db, "activation_codes");
            const q = query(codesRef, where("code", "==", code.trim()), where("courseId", "==", courseId));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                alert("❌ كود التفعيل غير صحيح أو لا ينتمي لهذه المحاضرة!");
                return;
            }

            let codeDocId = null;
            let codeData = null;
            querySnapshot.forEach((doc) => {
                codeDocId = doc.id;
                codeData = doc.data();
            });

            if (codeData.isUsed) {
                alert("⚠️ عذراً، هذا الكود تم استخدامه من قبل!");
                return;
            }

            // تحديث الكود بأنه تم استخدامه
            await updateDoc(doc(db, "activation_codes", codeDocId), {
                isUsed: true,
                usedBy: userId
            });

            // إضافة الكورس لقائمة الكورسات المفعلة للطالب
            await updateDoc(doc(db, "users", userId), {
                unlockedCourses: arrayUnion(courseId)
            });

            alert("🎉 مبروك! تم تفعيل المحاضرة بنجاح، استمتع بالمشاهدة.");
            location.reload();
        }

        // تشغيل الفيديو الفعلي
        window.watchLesson = function(title, videoUrl, desc) {
            let videoId = videoUrl.includes('v=') ? videoUrl.split('v=')[1]?.split('&')[0] : videoUrl.split('/').pop();
            document.getElementById('dynamic-area').innerHTML = `
                <button onclick="location.reload()" class="mb-6 flex items-center gap-2 text-sky-400 font-bold">
                    <i class="fa-solid fa-arrow-right"></i> العودة للمحاضرات
                </button>
                <div class="w-full aspect-video bg-black rounded-3xl overflow-hidden border border-slate-800 shadow-2xl mb-6">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6">
                    <h2 class="text-2xl font-black text-white">${title}</h2>
                    <p class="text-slate-300 mt-3 leading-relaxed">${desc}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
