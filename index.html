<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المتفوقين التعليمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; user-select: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-sky-500 selection:text-slate-950">

    <!-- نافذة منبثقة مخصصة للتنبيهات -->
    <div id="custom-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
            <div id="modal-icon" class="w-14 h-14 bg-sky-500/20 text-sky-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-circle-info"></i>
            </div>
            <h3 id="modal-title" class="text-lg font-bold text-white mb-2">تنبيه النظام</h3>
            <p id="modal-text" class="text-slate-400 text-sm mb-6">رسالة توضيحية...</p>
            <button onclick="closeModal()" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">حسناً</button>
        </div>
    </div>

    <!-- نافذة مخصصة لإدخال كود التفعيل بدلاً من رسالة المتصفح -->
    <div id="activation-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
            <div class="w-14 h-14 bg-amber-500/20 text-amber-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-key"></i>
            </div>
            <h3 class="text-lg font-bold text-white mb-2">تفعيل المحاضرة</h3>
            <p class="text-slate-400 text-sm mb-4">أدخل كود التفعيل المكون من 6 أرقام الخاص بهذه المحاضرة:</p>
            <input type="text" id="activation-code-input" placeholder="مثال: 366287" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-center font-mono font-bold tracking-widest text-lg mb-4 outline-none focus:border-amber-500" />
            <div class="flex gap-2">
                <button id="submit-code-btn" class="flex-1 bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold py-3 rounded-xl transition">تفعيل</button>
                <button onclick="closeActivationModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة إعدادات الطالب -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold text-white mb-2"><i class="fa-solid fa-gear text-sky-400 ml-2"></i>الإعدادات الشخصية</h3>
            <p class="text-slate-400 text-xs mb-4">تعديل بياناتك سيتم إرساله للمعلم للموافقة عليه أولاً.</p>
            <form id="settings-form" class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-slate-300 mb-1">الاسم الرباعي</label>
                    <input type="text" id="set-fullName" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">هاتف الطالب</label>
                        <input type="tel" id="set-studentPhone" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">هاتف الأب</label>
                        <input type="tel" id="set-fatherPhone" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">هاتف الأم</label>
                        <input type="tel" id="set-motherPhone" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">المدرسة</label>
                        <input type="text" id="set-school" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-300 mb-1">المحافظة</label>
                        <input type="text" id="set-governorate" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                    </div>
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="submit" class="flex-1 bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold py-3 rounded-xl transition text-sm">إرسال طلب التعديل للإدارة</button>
                    <button type="button" onclick="closeSettingsModal()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-4 py-3 rounded-xl transition text-sm">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin"></div>
                <p class="text-slate-400 font-medium">جاري تهيئة المنصة الآمنة...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, updateDoc, arrayUnion, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqapVeFxYyLJWryfqJrwBBmaIFcsCLn-w",
            authDomain: "educational-platform-f5e7e.firebaseapp.com",
            projectId: "educational-platform-f5e7e",
            storageBucket: "educational-platform-f5e7e.firebasestorage.app",
            messagingSenderId: "284103839814",
            appId: "1:284103839814:web:9b6abd761a585c46f03a47"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appDiv = document.getElementById('app');

        // منع السكرين شوت وفحص الشاشة
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.shiftKey && ['I', 'C', 'J'].includes(e.key.toUpperCase())) || (e.ctrlKey && e.key.toUpperCase() === 'U')) {
                e.preventDefault();
                showModal("تنبيه أمني", "عذراً، عمليات التصوير أو النسخ أو فحص الشاشة محظورة.", "rose");
            }
        });

        window.showModal = function(title, text, type = "sky") {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            const iconDiv = document.getElementById('modal-icon');
            if(type === "rose") {
                iconDiv.className = "w-14 h-14 bg-rose-500/20 text-rose-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl";
                iconDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            } else {
                iconDiv.className = "w-14 h-14 bg-sky-500/20 text-sky-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl";
                iconDiv.innerHTML = '<i class="fa-solid fa-circle-info"></i>';
            }
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        window.closeModal = function() { document.getElementById('custom-modal').classList.add('hidden'); }
        window.closeActivationModal = function() { document.getElementById('activation-modal').classList.add('hidden'); }
        window.closeSettingsModal = function() { document.getElementById('settings-modal').classList.add('hidden'); }

        let currentActiveCourseId = null;
        let currentUserId = null;

        window.openActivationModal = function(courseId, userId) {
            currentActiveCourseId = courseId;
            currentUserId = userId;
            document.getElementById('activation-code-input').value = '';
            document.getElementById('activation-modal').classList.remove('hidden');
        }

        document.getElementById('submit-code-btn').addEventListener('click', () => {
            const code = document.getElementById('activation-code-input').value.trim();
            if (!code) { showModal("تنبيه", "الرجاء إدخال الكود!", "rose"); return; }
            closeActivationModal();
            verifyAndUnlockCode(code, currentActiveCourseId, currentUserId);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // استماع فوري لتغيرات مستند الطالب (عشان لو تم حظره أو تحديث بياناته تسمع فوراً)
                onSnapshot(doc(db, "users", user.uid), (userSnap) => {
                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        if(userData.deviceBlocked) {
                            signOut(auth);
                            showModal("جهاز محظور أمنياً", "عذراً، تم حظر هذا الجهاز من قِبل إدارة المنصة.", "rose");
                            return;
                        }
                        renderDashboard(user, userData);
                    } else {
                        renderProfileForm(user);
                    }
                });
            } else {
                renderAuth();
            }
        });

        function renderAuth() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6">
                    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                        <div class="text-center mb-6">
                            <h1 class="text-2xl font-black text-white">تسجيل الدخول للمنصة</h1>
                            <p class="text-slate-400 text-sm mt-1">أدخل بريدك وكلمة المرور للمتابعة</p>
                        </div>
                        <form id="auth-form" class="space-y-4">
                            <input type="email" id="email" required placeholder="البريد الإلكتروني" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <input type="password" id="password" required placeholder="كلمة المرور" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">دخول / إنشاء حساب</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('auth-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                } catch {
                    try {
                        await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                    } catch {
                        showModal("خطأ", "تأكد من صحة البيانات أو أن كلمة المرور 6 أحرف على الأقل.", "rose");
                    }
                }
            });
        }

        function renderProfileForm(user) {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6">
                    <div class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                        <h2 class="text-2xl font-black text-white mb-2">استكمال بيانات الطالب الشخصية</h2>
                        <form id="profile-form" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                            <input type="text" id="fullName" required placeholder="الاسم الرباعي" class="md:col-span-2 bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="tel" id="studentPhone" required placeholder="رقم هاتف الطالب" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="tel" id="fatherPhone" required placeholder="رقم هاتف الأب" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="tel" id="motherPhone" required placeholder="رقم هاتف الأم" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="text" id="nationalId" required placeholder="الرقم القومي (14 رقم)" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="text" id="school" required placeholder="اسم المدرسة" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="text" id="governorate" required placeholder="المحافظة" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <select id="academicYear" class="md:col-span-2 bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                <option value="first">الصف الأول الثانوي</option>
                                <option value="second">الصف الثاني الثانوي</option>
                                <option value="third">الصف الثالث الثانوي</option>
                            </select>
                            <button type="submit" class="md:col-span-2 bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3.5 rounded-xl transition">حفظ والانتقال للمنصة</button>
                        </form>
                    </div>
                </div>
            `;

            document.getElementById('profile-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const studentPhone = document.getElementById('studentPhone').value.trim();
                const nationalId = document.getElementById('nationalId').value.trim();

                const usersRef = collection(db, "users");
                if (!(await getDocs(query(usersRef, where("studentPhone", "==", studentPhone)))).empty || !(await getDocs(query(usersRef, where("nationalId", "==", nationalId)))).empty) {
                    showModal("تنبيه تكرار", "رقم الهاتف أو الرقم القومي مُسجل مسبقاً بحساب آخر!", "rose");
                    return;
                }

                const data = {
                    fullName: document.getElementById('fullName').value,
                    studentPhone: studentPhone,
                    fatherPhone: document.getElementById('fatherPhone').value,
                    motherPhone: document.getElementById('motherPhone').value,
                    nationalId: nationalId,
                    school: document.getElementById('school').value,
                    governorate: document.getElementById('governorate').value,
                    academicYear: document.getElementById('academicYear').value,
                    unlockedCourses: [],
                    deviceBlocked: false
                };

                await setDoc(doc(db, "users", user.uid), data);
            });
        }

        function renderDashboard(user, userData) {
            appDiv.innerHTML = `
                <div class="min-h-screen flex flex-col md:flex-row">
                    <aside class="w-full md:w-72 bg-slate-900 border-l border-slate-800 p-6 hidden md:flex flex-col justify-between">
                        <div>
                            <div class="flex items-center gap-3 mb-10 px-2">
                                <div class="w-10 h-10 bg-sky-500 text-slate-950 rounded-xl flex items-center justify-center font-bold">
                                    <i class="fa-solid fa-graduation-cap"></i>
                                </div>
                                <div>
                                    <h1 class="font-bold text-white text-sm">منصة المتفوقين</h1>
                                    <span class="text-xs text-sky-400">بوابة الطالب الذكية</span>
                                </div>
                            </div>
                            <nav class="space-y-2">
                                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold bg-sky-500 text-slate-950">
                                    <i class="fa-solid fa-play-circle"></i> كورساتي المفعلة
                                </a>
                            </nav>
                        </div>
                    </aside>

                    <main class="flex-1 p-6 md:p-10 overflow-y-auto">
                        <header class="flex justify-between items-center mb-8 pb-6 border-b border-slate-800 relative">
                            <div>
                                <h2 class="text-2xl md:text-3xl font-black text-white">مرحباً، ${userData.fullName} 👋</h2>
                                <p class="text-slate-400 text-sm mt-1">السنة الدراسية: <span class="text-sky-400 font-bold">${userData.academicYear === 'third' ? 'الثالث الثانوي' : userData.academicYear === 'second' ? 'الثاني الثانوي' : 'الأول الثانوي'}</span></p>
                            </div>
                            
                            <div class="relative">
                                <button id="menu-btn" class="flex items-center gap-2 bg-slate-900 border border-slate-800 px-4 py-2.5 rounded-2xl hover:border-sky-500 transition">
                                    <div class="w-8 h-8 rounded-lg bg-sky-500/20 text-sky-400 flex items-center justify-center font-bold text-xs">${userData.fullName.charAt(0)}</div>
                                    <span class="text-sm font-bold text-white hidden md:inline">${userData.fullName.split(' ')[0]}</span>
                                    <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
                                </button>
                                <div id="dropdown-menu" class="hidden absolute left-0 mt-2 w-48 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl py-2 z-50">
                                    <button onclick="openSettingsModal('${userData.fullName}', '${userData.studentPhone}', '${userData.fatherPhone}', '${userData.motherPhone}', '${userData.school}', '${userData.governorate}')" class="w-full text-right block px-4 py-2.5 text-sm text-slate-300 hover:bg-slate-800">
                                        <i class="fa-solid fa-gear ml-2"></i> الإعدادات الشخصية
                                    </button>
                                    <div class="border-t border-slate-800 my-1"></div>
                                    <button id="logout-btn" class="w-full text-right block px-4 py-2.5 text-sm text-rose-400 hover:bg-rose-500/10">
                                        <i class="fa-solid fa-right-from-bracket ml-2"></i> تسجيل الخروج
                                    </button>
                                </div>
                            </div>
                        </header>

                        <div id="dynamic-area">
                            <h3 class="text-xl font-bold text-white mb-4">المحاضرات المتاحة لسنتك الدراسية</h3>
                            <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <p class="text-slate-400">جاري التحميل...</p>
                            </div>
                        </div>
                    </main>
                </div>
            `;

            const menuBtn = document.getElementById('menu-btn');
            const dropdown = document.getElementById('dropdown-menu');
            menuBtn.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('hidden'); });
            window.addEventListener('click', () => dropdown.classList.add('hidden'));

            document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

            // الاستماع الحي للكورسات والأكواد عند الطالب لتتحدث أوتوماتيك
            onSnapshot(collection(db, "courses"), (coursesSnap) => {
                onSnapshot(collection(db, "activation_codes"), (codesSnap) => {
                    loadStudentCourses(userData, user.uid, coursesSnap, codesSnap);
                });
            });
        }

        window.openSettingsModal = function(name, sPhone, fPhone, mPhone, school, gov) {
            document.getElementById('set-fullName').value = name;
            document.getElementById('set-studentPhone').value = sPhone;
            document.getElementById('set-fatherPhone').value = fPhone;
            document.getElementById('set-motherPhone').value = mPhone;
            document.getElementById('set-school').value = school;
            document.getElementById('set-governorate').value = gov;
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        // إرسال طلب تعديل البيانات للمعلم
        document.getElementById('settings-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) return;

            await setDoc(doc(collection(db, "profile_requests")), {
                userId: user.uid,
                currentName: document.getElementById('set-fullName').value,
                newFullName: document.getElementById('set-fullName').value,
                newStudentPhone: document.getElementById('set-studentPhone').value,
                newFatherPhone: document.getElementById('set-fatherPhone').value,
                newMotherPhone: document.getElementById('set-motherPhone').value,
                newSchool: document.getElementById('set-school').value,
                newGovernorate: document.getElementById('set-governorate').value,
                status: 'pending',
                createdAt: new Date()
            });

            closeSettingsModal();
            showModal("تم الإرسال", "تم إرسال طلب تعديل بياناتك للمعلم بنجاح، في انتظار الموافقة.");
        });

        async function loadStudentCourses(userData, userId, coursesSnap, codesSnap) {
            const grid = document.getElementById('courses-grid');
            try {
                // خريطة لتحديد هل كود المحاضرة معطل أم لا
                let courseCodeDisabledMap = {};
                codesSnap.forEach(docSnap => {
                    const codeObj = docSnap.data();
                    if (codeObj.isDisabled && codeObj.usedBy === userId) {
                        courseCodeDisabledMap[codeObj.courseId] = true;
                    }
                });

                let html = '';
                
                coursesSnap.forEach((docSnap) => {
                    const c = docSnap.data();
                    const courseId = docSnap.id;
                    const isUnlocked = userData.unlockedCourses && userData.unlockedCourses.includes(courseId);
                    const isActive = c.isActive !== false;
                    const isCodeDisabled = courseCodeDisabledMap[courseId] || false;

                    if (c.academicYear === userData.academicYear && isActive) {
                        html += `
                            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 flex flex-col justify-between shadow-xl">
                                <div>
                                    <span class="text-xs bg-sky-500/10 text-sky-400 px-3 py-1 rounded-xl font-bold">${c.subject}</span>
                                    <h3 class="text-lg font-bold text-white mt-3">${c.title}</h3>
                                    <p class="text-slate-400 text-sm mt-2 line-clamp-2">${c.description}</p>
                                </div>
                                <div class="mt-6">
                                    ${isUnlocked ? (isCodeDisabled ? `
                                        <button onclick="showModal('محاضرة معطلة', 'تم تعطيل كود هذه المحاضرة من قِبل المعلم.', 'rose')" class="w-full bg-rose-500/10 border border-rose-500/30 text-rose-400 font-extrabold py-3 rounded-xl flex items-center justify-center gap-2">
                                            <i class="fa-solid fa-ban"></i> تم تعطيل كود المحاضرة
                                        </button>
                                    ` : `
                                        <button onclick="window.watchLesson('${c.title}', '${c.videoUrl}', '${c.description}')" class="w-full bg-emerald-500 text-slate-950 font-extrabold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-emerald-400 transition">
                                            <i class="fa-solid fa-play"></i> مشاهدة المحاضرة
                                        </button>
                                    `) : `
                                        <button onclick="window.openActivationModal('${courseId}', '${userId}')" class="w-full bg-amber-500/10 border border-amber-500/30 text-amber-400 font-extrabold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-amber-500 hover:text-slate-950 transition">
                                            <i class="fa-solid fa-lock"></i> أدخل كود التفعيل
                                        </button>
                                    `}
                                </div>
                            </div>
                        `;
                    }
                });
                grid.innerHTML = html || '<p class="text-slate-400">لا توجد محاضرات نشطة مضافة لسنتك الدراسية حالياً.</p>';
            } catch (err) {
                grid.innerHTML = '<p class="text-rose-400">حدث خطأ في تحميل المحاضرات.</p>';
            }
        }

        async function verifyAndUnlockCode(code, courseId, userId) {
            const codesRef = collection(db, "activation_codes");
            const q = query(codesRef, where("code", "==", code), where("courseId", "==", courseId));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                showModal("خطأ في التفعيل", "كود التفعيل غير صحيح أو لا ينتمي لهذه المحاضرة!", "rose");
                return;
            }

            let codeDocId = null;
            let codeData = null;
            querySnapshot.forEach((doc) => { codeDocId = doc.id; codeData = doc.data(); });

            if (codeData.isDisabled) {
                showModal("كود معطل", "عذراً، هذا الكود معطّل مؤقتاً من قِبل إدارة المنصة.", "rose");
                return;
            }

            if (codeData.isUsed) {
                showModal("كود مستخدم مسبقاً", "عذراً، هذا الكود تم استخدامه من قِبل جهاز/طالب آخر!", "rose");
                return;
            }

            await updateDoc(doc(db, "activation_codes", codeDocId), { isUsed: true, usedBy: userId });
            await updateDoc(doc(db, "users", userId), { unlockedCourses: arrayUnion(courseId) });

            showModal("تم التفعيل بنجاح!", "مبروك! تم فتح المحاضرة لك بنجاح.");
        }

        window.watchLesson = function(title, videoUrl, desc) {
            let videoId = videoUrl.includes('v=') ? videoUrl.split('v=')[1]?.split('&')[0] : videoUrl.split('/').pop();
            document.getElementById('dynamic-area').innerHTML = `
                <button onclick="location.reload()" class="mb-6 flex items-center gap-2 text-sky-400 font-bold transition hover:text-sky-300">
                    <i class="fa-solid fa-arrow-right"></i> العودة لقائمة المحاضرات
                </button>
                <div class="w-full aspect-video bg-black rounded-3xl overflow-hidden border border-slate-800 shadow-2xl mb-6 relative">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6">
                    <h2 class="text-2xl font-black text-white">${title}</h2>
                    <p class="text-slate-300 mt-3 leading-relaxed">${desc}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
