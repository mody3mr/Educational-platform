<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة المتفوقين التعليمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; user-select: none; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen selection:bg-sky-500 selection:text-slate-950">

    <!-- نافذة منبثقة عامة للتنبيهات بـ Z-Index عالي جداً -->
    <div id="custom-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[9999] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
            <div id="modal-icon" class="w-14 h-14 bg-sky-500/20 text-sky-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-circle-info"></i>
            </div>
            <h3 id="modal-title" class="text-lg font-bold text-white mb-2">تنبيه النظام</h3>
            <p id="modal-text" class="text-slate-400 text-sm mb-6">رسالة توضيحية...</p>
            <button onclick="closeModal()" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">حسناً</button>
        </div>
    </div>

    <!-- نافذة إدخال كود التفعيل -->
    <div id="activation-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
            <div class="w-14 h-14 bg-amber-500/20 text-amber-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-key"></i>
            </div>
            <h3 class="text-lg font-bold text-white mb-2">تفعيل المحاضرة</h3>
            <p class="text-slate-400 text-sm mb-4">أدخل كود التفعيل:</p>
            <input type="text" id="activation-code-input" placeholder="مثال: 366287" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-center font-mono font-bold tracking-widest text-lg mb-4 outline-none focus:border-amber-500" />
            <div class="flex gap-2">
                <button id="submit-code-btn" class="flex-1 bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold py-3 rounded-xl transition">تفعيل</button>
                <button onclick="closeActivationModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-bold py-3 rounded-xl transition">إلغاء</button>
            </div>
        </div>
    </div>

    <!-- نافذة إعدادات الطالب -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-lg w-full shadow-2xl max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold text-white mb-2"><i class="fa-solid fa-gear text-sky-400 ml-2"></i>الإعدادات الشخصية</h3>
            <form id="settings-form" class="space-y-3 mt-4">
                <input type="text" id="set-fullName" required placeholder="الاسم الرباعي" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                <div class="grid grid-cols-3 gap-2">
                    <input type="tel" id="set-studentPhone" required placeholder="هاتف الطالب" class="bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                    <input type="tel" id="set-fatherPhone" required placeholder="هاتف الأب" class="bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                    <input type="tel" id="set-motherPhone" required placeholder="هاتف الأم" class="bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="set-school" required placeholder="المدرسة" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                    <input type="text" id="set-governorate" required placeholder="المحافظة" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-sm" />
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="submit" class="flex-1 bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold py-3 rounded-xl transition text-sm">إرسال طلب التعديل</button>
                    <button type="button" onclick="closeSettingsModal()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-4 py-3 rounded-xl transition text-sm">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <!-- نافذة الإشعارات -->
    <div id="notifications-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-md w-full shadow-2xl max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-800">
                <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-bell text-sky-400 ml-2"></i>التنبيهات</h3>
                <button onclick="closeNotificationsModal()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div id="notifications-list" class="space-y-3">
                <p class="text-slate-400 text-xs text-center py-4">لا توجد تنبيهات جديدة.</p>
            </div>
        </div>
    </div>

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="flex flex-col items-center gap-4">
                <div class="w-12 h-12 border-4 border-sky-500/20 border-t-sky-500 rounded-full animate-spin"></div>
                <p class="text-slate-400 font-medium">جاري تهيئة المنصة...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, updateDoc, arrayUnion, query, where, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqapVeFxYyLJWryfqJrwBBmaIFcsCLn-w",
            authDomain: "educational-platform-f5e7e.firebaseapp.com",
            projectId: "educational-platform-f5e7e",
            storageBucket: "educational-platform-f5e7e.firebasestorage.app",
            messagingSenderId: "284103839814",
            appId: "1:284103839814:web:9b6abd761a585c46f03a47"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appDiv = document.getElementById('app');

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if (e.key === 'PrintScreen' || (e.ctrlKey && e.shiftKey && ['I', 'C', 'J'].includes(e.key.toUpperCase())) || (e.ctrlKey && e.key.toUpperCase() === 'U')) {
                e.preventDefault();
                showModal("تنبيه أمني", "عذراً، عمليات التصوير أو النسخ أو فحص الشاشة محظورة.", "rose");
            }
        });

        window.showModal = function(title, text, type = "sky") {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            const iconDiv = document.getElementById('modal-icon');
            if(type === "rose") {
                iconDiv.className = "w-14 h-14 bg-rose-500/20 text-rose-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl";
                iconDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            } else {
                iconDiv.className = "w-14 h-14 bg-sky-500/20 text-sky-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl";
                iconDiv.innerHTML = '<i class="fa-solid fa-circle-info"></i>';
            }
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        window.closeModal = function() { document.getElementById('custom-modal').classList.add('hidden'); }
        window.closeActivationModal = function() { document.getElementById('activation-modal').classList.add('hidden'); }
        window.closeSettingsModal = function() { document.getElementById('settings-modal').classList.add('hidden'); }
        window.closeNotificationsModal = function() { document.getElementById('notifications-modal').classList.add('hidden'); }
        window.openNotificationsModal = function() { document.getElementById('notifications-modal').classList.remove('hidden'); }

        let currentActiveCourseId = null;
        let currentUserId = null;

        window.openActivationModal = function(courseId, userId) {
            currentActiveCourseId = courseId;
            currentUserId = userId;
            document.getElementById('activation-code-input').value = '';
            document.getElementById('activation-modal').classList.remove('hidden');
        }

        document.getElementById('submit-code-btn').addEventListener('click', () => {
            const code = document.getElementById('activation-code-input').value.trim();
            if (!code) { showModal("تنبيه", "الرجاء إدخال الكود!", "rose"); return; }
            closeActivationModal();
            verifyAndUnlockCode(code, currentActiveCourseId, currentUserId);
        });

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                onSnapshot(doc(db, "users", user.uid), (userSnap) => {
                    if (userSnap.exists()) {
                        const userData = userSnap.data();
                        if(userData.deviceBlocked) {
                            signOut(auth);
                            showModal("جهاز محظور أمنياً", "عذراً، تم حظر هذا الجهاز.", "rose");
                            return;
                        }
                        renderDashboard(user, userData);
                    } else {
                        renderProfileForm(user);
                    }
                });
            } else {
                renderAuth();
            }
        });

        function renderAuth() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6">
                    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                        <h2 class="text-2xl font-black text-white text-center mb-6">تسجيل الدخول للمنصة</h2>
                        <form id="auth-form" class="space-y-4">
                            <input type="email" id="email" required placeholder="البريد الإلكتروني" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <input type="password" id="password" required placeholder="كلمة المرور" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">دخول / تسجيـل</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('auth-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                try {
                    await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                } catch {
                    try {
                        await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
                    } catch {
                        showModal("خطأ", "تأكد من صحة البيانات.", "rose");
                    }
                }
            });
        }

        function renderProfileForm(user) {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6">
                    <div class="w-full max-w-xl bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                        <h2 class="text-2xl font-black text-white mb-2">استكمال بيانات الطالب الشخصية</h2>
                        <form id="profile-form" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                            <input type="text" id="fullName" required placeholder="الاسم الرباعي" class="md:col-span-2 bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="tel" id="studentPhone" required placeholder="رقم هاتف الطالب" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="tel" id="fatherPhone" required placeholder="رقم هاتف الأب" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="tel" id="motherPhone" required placeholder="رقم هاتف الأم" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="text" id="nationalId" required placeholder="الرقم القومي (14 رقم)" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="text" id="school" required placeholder="اسم المدرسة" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="text" id="governorate" required placeholder="المحافظة" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <select id="academicYear" class="md:col-span-2 bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                <option value="first">الصف الأول الثانوي</option>
                                <option value="second">الصف الثاني الثانوي</option>
                                <option value="third">الصف الثالث الثانوي</option>
                            </select>
                            <button type="submit" class="md:col-span-2 bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3.5 rounded-xl transition">حفظ والانتقال للمنصة</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('profile-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await setDoc(doc(db, "users", user.uid), {
                    fullName: document.getElementById('fullName').value,
                    studentPhone: document.getElementById('studentPhone').value,
                    fatherPhone: document.getElementById('fatherPhone').value,
                    motherPhone: document.getElementById('motherPhone').value,
                    nationalId: document.getElementById('nationalId').value,
                    school: document.getElementById('school').value,
                    governorate: document.getElementById('governorate').value,
                    academicYear: document.getElementById('academicYear').value,
                    unlockedCourses: [], readNotifications: [], deviceBlocked: false
                });
            });
        }

        function renderDashboard(user, userData) {
            appDiv.innerHTML = `
                <div class="min-h-screen flex flex-col md:flex-row">
                    <aside class="w-full md:w-72 bg-slate-900 border-l border-slate-800 p-6 hidden md:flex flex-col justify-between">
                        <div>
                            <div class="flex items-center gap-3 mb-10 px-2">
                                <div class="w-10 h-10 bg-sky-500 text-slate-950 rounded-xl flex items-center justify-center font-bold">
                                    <i class="fa-solid fa-graduation-cap"></i>
                                </div>
                                <div>
                                    <h1 class="font-bold text-white text-sm">منصة المتفوقين</h1>
                                    <span class="text-xs text-sky-400">بوابة الطالب الذكية</span>
                                </div>
                            </div>
                            <nav class="space-y-2">
                                <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl font-bold bg-sky-500 text-slate-950">
                                    <i class="fa-solid fa-play-circle"></i> كورساتي المفعلة
                                </a>
                            </nav>
                        </div>
                    </aside>

                    <main class="flex-1 p-6 md:p-10 overflow-y-auto">
                        <header class="flex justify-between items-center mb-8 pb-6 border-b border-slate-800 relative">
                            <div>
                                <h2 class="text-2xl md:text-3xl font-black text-white">مرحباً، ${userData.fullName} 👋</h2>
                                <p class="text-slate-400 text-sm mt-1">السنة الدراسية: <span class="text-sky-400 font-bold">${userData.academicYear === 'third' ? 'الثالث الثانوي' : userData.academicYear === 'second' ? 'الصف الثاني الثانوي' : 'الأول الثانوي'}</span></p>
                            </div>
                            
                            <div class="flex items-center gap-3">
                                <button onclick="openNotificationsModal()" class="relative bg-slate-900 border border-slate-800 w-11 h-11 rounded-2xl flex items-center justify-center text-sky-400 hover:border-sky-500 transition">
                                    <i class="fa-solid fa-bell"></i>
                                    <span id="notif-badge" class="absolute -top-1 -right-1 w-4 h-4 bg-rose-500 rounded-full text-[10px] text-white flex items-center justify-center hidden">!</span>
                                </button>

                                <div class="relative">
                                    <button id="menu-btn" class="flex items-center gap-2 bg-slate-900 border border-slate-800 px-4 py-2.5 rounded-2xl hover:border-sky-500 transition">
                                        <div class="w-8 h-8 rounded-lg bg-sky-500/20 text-sky-400 flex items-center justify-center font-bold text-xs">${userData.fullName.charAt(0)}</div>
                                        <span class="text-sm font-bold text-white hidden md:inline">${userData.fullName.split(' ')[0]}</span>
                                        <i class="fa-solid fa-chevron-down text-xs text-slate-400"></i>
                                    </button>
                                    <div id="dropdown-menu" class="hidden absolute left-0 mt-2 w-48 bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl py-2 z-50">
                                        <button onclick="openSettingsModal('${userData.fullName}', '${userData.studentPhone}', '${userData.fatherPhone}', '${userData.motherPhone}', '${userData.school}', '${userData.governorate}')" class="w-full text-right block px-4 py-2.5 text-sm text-slate-300 hover:bg-slate-800">
                                            <i class="fa-solid fa-gear ml-2"></i> الإعدادات الشخصية
                                        </button>
                                        <div class="border-t border-slate-800 my-1"></div>
                                        <button id="logout-btn" class="w-full text-right block px-4 py-2.5 text-sm text-rose-400 hover:bg-rose-500/10">
                                            <i class="fa-solid fa-right-from-bracket ml-2"></i> تسجيل الخروج
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </header>

                        <div id="dynamic-area">
                            <h3 class="text-xl font-bold text-white mb-4">المحاضرات المتاحة لسنتك الدراسية</h3>
                            <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <p class="text-slate-400">جاري التحميل...</p>
                            </div>
                        </div>
                    </main>
                </div>
            `;

            const menuBtn = document.getElementById('menu-btn');
            const dropdown = document.getElementById('dropdown-menu');
            menuBtn.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('hidden'); });
            window.addEventListener('click', () => dropdown.classList.add('hidden'));
            document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

            // تشغيل الـ Listeners المنفصلة بأمان تام
            setupStudentRealtimeData(user, userData);
        }

        let globalCourses = [];
        let globalCodes = [];
        let globalNotifications = [];

        function setupStudentRealtimeData(user, userData) {
            onSnapshot(collection(db, "courses"), (snap) => {
                globalCourses = [];
                snap.forEach(d => globalCourses.push({ id: d.id, ...d.data() }));
                refreshStudentView(userData, user.uid);
            });

            onSnapshot(collection(db, "activation_codes"), (snap) => {
                globalCodes = [];
                snap.forEach(d => globalCodes.push(d.data()));
                refreshStudentView(userData, user.uid);
            });

            onSnapshot(collection(db, "notifications"), (snap) => {
                globalNotifications = [];
                snap.forEach(d => globalNotifications.push({ id: d.id, ...d.data() }));
                refreshStudentView(userData, user.uid);
            });

            // استماع حي لنتائج اختبارات الطالب
            onSnapshot(collection(db, "quiz_results"), (snap) => {
                window.studentQuizResults = {};
                snap.forEach(d => {
                    const r = d.data();
                    if (r.studentId === user.uid) {
                        window.studentQuizResults[r.courseId] = { id: d.id, ...r };
                    }
                });
                refreshStudentView(userData, user.uid);
            });
        }

        function refreshStudentView(userData, userId) {
            const grid = document.getElementById('courses-grid');
            const notifList = document.getElementById('notifications-list');
            const notifBadge = document.getElementById('notif-badge');

            if (!grid) return;

            let notifHtml = '';
            let unreadCount = 0;
            const readList = userData.readNotifications || [];

            globalNotifications.forEach(n => {
                const isRead = readList.includes(n.id);
                if (n.targetYear === 'all' || n.targetYear === userData.academicYear || n.targetUserId === userId) {
                    if (!isRead) unreadCount++;
                    notifHtml += `
                        <div onclick="window.markNotificationRead('${n.id}')" class="bg-slate-950 border ${isRead ? 'border-slate-800 opacity-60' : 'border-sky-500/50'} rounded-2xl p-3 cursor-pointer hover:border-sky-500 transition">
                            <div class="flex justify-between items-center mb-1">
                                <h4 class="text-xs font-bold text-sky-400">${n.title}</h4>
                                ${!isRead ? '<span class="w-2 h-2 bg-sky-500 rounded-full animate-pulse"></span>' : '<span class="text-[10px] text-slate-500">مقروء</span>'}
                            </div>
                            <p class="text-slate-300 text-xs leading-relaxed">${n.message}</p>
                        </div>
                    `;
                }
            });

            if(notifList) notifList.innerHTML = notifHtml || '<p class="text-slate-400 text-xs text-center py-4">لا توجد تنبيهات حالياً.</p>';
            if(notifBadge) {
                if(unreadCount > 0) notifBadge.classList.remove('hidden');
                else notifBadge.classList.add('hidden');
            }

            let courseCodeDisabledMap = {};
            globalCodes.forEach(codeObj => {
                if (codeObj.isDisabled && codeObj.usedBy === userId) {
                    courseCodeDisabledMap[codeObj.courseId] = true;
                }
            });

            let html = '';
            globalCourses.forEach(c => {
                const isUnlocked = userData.unlockedCourses && userData.unlockedCourses.includes(c.id);
                const isActive = c.isActive !== false;
                const isCodeDisabled = courseCodeDisabledMap[c.id] || false;

                if (c.academicYear === userData.academicYear && isActive) {
                    window.allCoursesData = window.allCoursesData || {};
                    window.allCoursesData[c.id] = c;

                    html += `
                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 flex flex-col justify-between shadow-xl">
                            <div>
                                <span class="text-xs bg-sky-500/10 text-sky-400 px-3 py-1 rounded-xl font-bold">${c.subject}</span>
                                <h3 class="text-lg font-bold text-white mt-3">${c.title}</h3>
                                <p class="text-slate-400 text-sm mt-2 line-clamp-2">${c.description}</p>
                            </div>
                            <div class="mt-6">
                                ${isUnlocked ? (isCodeDisabled ? `
                                    <button onclick="showModal('محاضرة معطلة', 'تم تعطيل كود هذه المحاضرة من قِبل المعلم.', 'rose')" class="w-full bg-rose-500/10 border border-rose-500/30 text-rose-400 font-extrabold py-3 rounded-xl flex items-center justify-center gap-2">
                                        <i class="fa-solid fa-ban"></i> تم تعطيل كود المحاضرة
                                    </button>
                                ` : `
                                    <button onclick="window.openCourseView('${c.id}')" class="w-full bg-emerald-500 text-slate-950 font-extrabold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-emerald-400 transition">
                                        <i class="fa-solid fa-play"></i> دخول المحاضرة (فيديو وملفات)
                                    </button>
                                `) : `
                                    <button onclick="window.openActivationModal('${c.id}', '${userId}')" class="w-full bg-amber-500/10 border border-amber-500/30 text-amber-400 font-extrabold py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-amber-500 hover:text-slate-950 transition">
                                        <i class="fa-solid fa-lock"></i> أدخل كود التفعيل
                                    </button>
                                `}
                            </div>
                        </div>
                    `;
                }
            });
            grid.innerHTML = html || '<p class="text-slate-400">لا توجد محاضرات نشطة مضافة لسنتك الدراسية حالياً.</p>';
        }

        window.openSettingsModal = function(name, sPhone, fPhone, mPhone, school, gov) {
            document.getElementById('set-fullName').value = name;
            document.getElementById('set-studentPhone').value = sPhone;
            document.getElementById('set-fatherPhone').value = fPhone;
            document.getElementById('set-motherPhone').value = mPhone;
            document.getElementById('set-school').value = school;
            document.getElementById('set-governorate').value = gov;
            document.getElementById('settings-modal').classList.remove('hidden');
        }

        document.getElementById('settings-form')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user) return;
            await setDoc(doc(collection(db, "profile_requests")), {
                userId: user.uid, currentName: document.getElementById('set-fullName').value,
                newFullName: document.getElementById('set-fullName').value,
                newStudentPhone: document.getElementById('set-studentPhone').value,
                newFatherPhone: document.getElementById('set-fatherPhone').value,
                newMotherPhone: document.getElementById('set-motherPhone').value,
                newSchool: document.getElementById('set-school').value,
                newGovernorate: document.getElementById('set-governorate').value,
                status: 'pending', createdAt: new Date()
            });
            closeSettingsModal();
            showModal("تم الإرسال", "تم إرسال طلب تعديل بياناتك للمعلم.");
        });

        window.markNotificationRead = async function(notifId) {
            const user = auth.currentUser;
            if(!user) return;
            await updateDoc(doc(db, "users", user.uid), { readNotifications: arrayUnion(notifId) });
        }

        async function verifyAndUnlockCode(code, courseId, userId) {
            const q = query(collection(db, "activation_codes"), where("code", "==", code), where("courseId", "==", courseId));
            const querySnapshot = await getDocs(q);

            if (querySnapshot.empty) {
                showModal("خطأ في التفعيل", "كود التفعيل غير صحيح أو لا ينتمي لهذه المحاضرة!", "rose");
                return;
            }

            let codeDocId = null;
            let codeData = null;
            querySnapshot.forEach((doc) => { codeDocId = doc.id; codeData = doc.data(); });

            if (codeData.isDisabled) {
                showModal("كود معطل", "عذراً، هذا الكود معطّل مؤقتاً.", "rose");
                return;
            }

            if (codeData.isUsed) {
                showModal("كود مستخدم مسبقاً", "عذراً، هذا الكود تم استخدامه مسبقاً!", "rose");
                return;
            }

            await updateDoc(doc(db, "activation_codes", codeDocId), { isUsed: true, usedBy: userId });
            await updateDoc(doc(db, "users", userId), { unlockedCourses: arrayUnion(courseId) });

            showModal("تم التفعيل بنجاح!", "مبروك! تم فتح المحاضرة لك بنجاح.");
        }

        window.openCourseView = function(courseId) {
            const c = window.allCoursesData[courseId];
            if(!c) return;

            let videoId = c.videoUrl.includes('v=') ? c.videoUrl.split('v=')[1]?.split('&')[0] : c.videoUrl.split('/').pop();
            
            let filesHtml = (c.files || []).map(f => `
                <a href="${f.url}" target="_blank" class="flex items-center justify-between bg-slate-950 border border-slate-800 p-4 rounded-2xl hover:border-rose-500 transition">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-file-pdf text-rose-500 text-xl"></i>
                        <span class="font-bold text-sm text-white">${f.title}</span>
                    </div>
                    <span class="bg-rose-500/10 text-rose-400 text-xs px-3 py-1.5 rounded-xl font-bold">تحميل</span>
                </a>
            `).join('') || `<p class="text-slate-500 text-xs">لا توجد ملفات مرفقة.</p>`;

            const studentRes = window.studentQuizResults ? window.studentQuizResults[courseId] : null;
            let quizBtnHtml = '';

            if (c.quiz && c.quiz.length > 0) {
                if (studentRes && !studentRes.canRetake) {
                    quizBtnHtml = `
                        <div class="bg-slate-950 border border-slate-800 p-4 rounded-2xl text-center space-y-2">
                            <p class="text-xs text-emerald-400 font-bold"><i class="fa-solid fa-check-circle"></i> لقد أتممت هذا الامتحان مسبقاً</p>
                            <p class="text-sm font-mono font-bold text-amber-400">درجتك: ${studentRes.score} / ${studentRes.total}</p>
                            <p class="text-[11px] text-slate-500">تم تسجيل النتيجة. بانتظار موافقة المعلم لإعادة الامتحان.</p>
                        </div>
                    `;
                } else if (studentRes && studentRes.canRetake) {
                    quizBtnHtml = `
                        <button onclick="window.startQuiz('${courseId}')" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold py-4 rounded-2xl transition flex items-center justify-center gap-2 shadow-lg shadow-amber-500/20">
                            <i class="fa-solid fa-rotate-right"></i> إعادة امتحان المحاضرة (مسموح لك من المعلم)
                        </button>
                    `;
                } else {
                    quizBtnHtml = `
                        <button onclick="window.startQuiz('${courseId}')" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold py-4 rounded-2xl transition flex items-center justify-center gap-2 shadow-lg shadow-indigo-600/20">
                            <i class="fa-solid fa-clipboard-question"></i> بدء امتحان المحاضرة (المدة: ${c.quizDuration || 10} دقائق)
                        </button>
                    `;
                }
            } else {
                quizBtnHtml = `<p class="text-slate-500 text-xs text-center">لا يوجد امتحان مضاف.</p>`;
            }

            document.getElementById('dynamic-area').innerHTML = `
                <button onclick="location.reload()" class="mb-6 flex items-center gap-2 text-sky-400 font-bold transition hover:text-sky-300">
                    <i class="fa-solid fa-arrow-right"></i> العودة لقائمة المحاضرات
                </button>
                
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="w-full aspect-video bg-black rounded-3xl overflow-hidden border border-slate-800 shadow-2xl relative">
                            <iframe class="w-full h-full" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>
                        </div>
                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6">
                            <h2 class="text-2xl font-black text-white">${c.title}</h2>
                            <p class="text-slate-300 mt-3 leading-relaxed">${c.description}</p>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 space-y-4">
                            <h3 class="text-base font-bold text-white"><i class="fa-solid fa-folder-open text-rose-400 ml-2"></i>الملفات الدراسية</h3>
                            <div class="space-y-2">${filesHtml}</div>
                        </div>

                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 space-y-4">
                            <h3 class="text-base font-bold text-white"><i class="fa-solid fa-award text-indigo-400 ml-2"></i>اختبار المحاضرة</h3>
                            ${quizBtnHtml}
                        </div>
                    </div>
                </div>
            `;
        }

        let quizTimerInterval = null;

        window.startQuiz = function(courseId) {
            const c = window.allCoursesData[courseId];
            if(!c || !c.quiz) return;

            let questionsHtml = '';
            c.quiz.forEach((q, qIndex) => {
                let optionsHtml = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHtml += `
                        <label class="flex items-center gap-3 bg-slate-950 border border-slate-800 p-3 rounded-xl cursor-pointer hover:border-indigo-500 transition">
                            <input type="radio" name="question_${qIndex}" value="${optIndex}" class="accent-indigo-500 w-4 h-4" />
                            <span class="text-sm text-white">${opt}</span>
                        </label>
                    `;
                });
                questionsHtml += `
                    <div class="bg-slate-950 border border-slate-800 rounded-2xl p-5 space-y-3">
                        <h4 class="font-bold text-white text-sm">س ${qIndex + 1}: ${q.question}</h4>
                        <div class="space-y-2">${optionsHtml}</div>
                    </div>
                `;
            });

            document.getElementById('dynamic-area').innerHTML = `
                <div class="max-w-3xl mx-auto bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl space-y-6">
                    <div class="flex justify-between items-center pb-4 border-b border-slate-800">
                        <div>
                            <h2 class="text-xl font-black text-white">امتحان: ${c.title}</h2>
                            <p class="text-slate-400 text-xs mt-1">تنبيه: مغادرة الصفحة أو الخروج من التبويب ينهي الامتحان بدرجة (صفر).</p>
                        </div>
                        <div class="bg-rose-500/10 border border-rose-500/30 text-rose-400 font-mono font-bold px-4 py-2 rounded-2xl text-lg flex items-center gap-2">
                            <i class="fa-solid fa-clock"></i> <span id="quiz-timer-display">--:--</span>
                        </div>
                    </div>

                    <form id="quiz-submit-form" class="space-y-6">
                        ${questionsHtml}
                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-extrabold py-4 rounded-2xl transition">
                            إرسال الإجابات النهائية
                        </button>
                    </form>
                </div>
            `;

            const durationMin = c.quizDuration || 10;
            let timeLeft = durationMin * 60;
            
            if(quizTimerInterval) clearInterval(quizTimerInterval);
            quizTimerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60);
                let s = timeLeft % 60;
                const timerEl = document.getElementById('quiz-timer-display');
                if(timerEl) timerEl.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                
                if(timeLeft <= 0) {
                    clearInterval(quizTimerInterval);
                    document.removeEventListener('visibilitychange', handleVisibilityHandler);
                    submitExam(courseId, true);
                }
            }, 1000);

            const handleVisibilityHandler = () => {
                if (document.hidden) {
                    clearInterval(quizTimerInterval);
                    document.removeEventListener('visibilitychange', handleVisibilityHandler);
                    submitExam(courseId, false, true);
                }
            };
            document.addEventListener('visibilitychange', handleVisibilityHandler);

            document.getElementById('quiz-submit-form').onsubmit = (e) => {
                e.preventDefault();
                clearInterval(quizTimerInterval);
                document.removeEventListener('visibilitychange', handleVisibilityHandler);
                submitExam(courseId);
            };
        }

        async function submitExam(courseId, isTimeout = false, isCheated = false) {
            const c = window.allCoursesData[courseId];
            let score = 0;
            const total = c.quiz.length;

            if (isCheated) {
                score = 0;
                showModal("تم إلغاء الامتحان", "تم رصد مغادرتك لصفحة الامتحان! تم احتساب درجتك (صفر).", "rose");
            } else {
                c.quiz.forEach((q, qIndex) => {
                    const selected = document.querySelector(`input[name="question_${qIndex}"]:checked`);
                    if (selected && parseInt(selected.value) === q.correct) {
                        score++;
                    }
                });
                if (isTimeout) {
                    showModal("انتهى الوقت", "انتهى الوقت المخصص، وتم تسجيل إجاباتك.", "sky");
                }
            }

            const user = auth.currentUser;
            const userDoc = await getDoc(doc(db, "users", user.uid));
            const studentName = userDoc.exists() ? userDoc.data().fullName : "طالب";

            const existingRes = window.studentQuizResults ? window.studentQuizResults[courseId] : null;

            if (existingRes && existingRes.id) {
                await updateDoc(doc(db, "quiz_results", existingRes.id), {
                    score: score, total: total, canRetake: false, createdAt: new Date()
                });
            } else {
                const qRef = collection(db, "quiz_results");
                const qSnap = await getDocs(query(qRef, where("studentId", "==", user.uid), where("courseId", "==", courseId)));
                if (!qSnap.empty) {
                    qSnap.forEach(async (d) => {
                        await updateDoc(doc(db, "quiz_results", d.id), { score: score, total: total, canRetake: false, createdAt: new Date() });
                    });
                } else {
                    await addDoc(collection(db, "quiz_results"), {
                        studentId: user.uid, studentName: studentName, courseId: courseId, courseTitle: c.title, score: score, total: total, canRetake: false, createdAt: new Date()
                    });
                }
            }

            document.getElementById('dynamic-area').innerHTML = `
                <div class="max-w-md mx-auto mt-20 bg-slate-900 border border-slate-800 rounded-3xl p-8 text-center shadow-2xl space-y-6">
                    <div class="w-20 h-20 ${isCheated ? 'bg-rose-500/20 text-rose-400' : 'bg-emerald-500/20 text-emerald-400'} rounded-3xl flex items-center justify-center mx-auto text-4xl">
                        <i class="fa-solid ${isCheated ? 'fa-triangle-exclamation' : 'fa-award'}"></i>
                    </div>
                    <h2 class="text-2xl font-black text-white">${isCheated ? 'تم إلغاء الامتحان!' : 'تم إرسال إجاباتك بنجاح!'}</h2>
                    <p class="text-slate-400 text-sm">درجتك الحالية:</p>
                    <div class="text-5xl font-black text-amber-400 font-mono">${score} / ${total}</div>
                    <button onclick="window.openCourseView('${courseId}')" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3.5 rounded-xl transition">
                        العودة للمحاضرة
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
