<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الطالب الذكية</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Cairo Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div class="flex min-h-screen">
        <!-- القائمة الجانبية -->
        <aside class="w-72 bg-slate-900 border-l border-slate-800 p-6 hidden md:flex flex-col justify-between">
            <div>
                <div class="flex items-center gap-3 mb-10">
                    <div class="bg-sky-500 text-slate-950 font-bold p-2.5 rounded-xl">
                        <i class="fa-solid fa-graduation-cap text-xl"></i>
                    </div>
                    <h1 class="text-xl font-bold">بوابة الطالب</h1>
                </div>
            </div>
        </aside>

        <!-- المحتوى الرئيسي -->
        <main class="flex-1 p-6 md:p-10 overflow-y-auto">
            <header class="mb-10 pb-6 border-b border-slate-800">
                <h2 class="text-3xl font-bold text-white">كورساتي المفعلة</h2>
                <p class="text-slate-400 mt-1">جاري تحميل المحاضرات المتاحة لك...</p>
            </header>

            <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-slate-400">جاري الاتصال بقاعدة البيانات...</p>
            </div>
        </main>
    </div>

    <!-- كود جافاسكريبت المدمج لضمان عمل الفايربيس بدون أخطاء مسارات -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // استبدل البيانات دي ببيانات مشروعك الحقيقية من فايربيس
        const firebaseConfig = {
        apiKey: "AIzaSyDqapVeFxYyLJWryfqJrwBBmaIFcsCLn-w",
        authDomain: "educational-platform-f5e7e.firebaseapp.com",
        projectId: "educational-platform-f5e7e",
        storageBucket: "educational-platform-f5e7e.firebasestorage.app",
        messagingSenderId: "284103839814",
        appId: "1:284103839814:web:9b6abd761a585c46f03a47"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadStudentCourses() {
            const grid = document.getElementById('courses-grid');
            try {
                const querySnapshot = await getDocs(collection(db, "courses"));
                if (querySnapshot.empty) {
                    grid.innerHTML = `<p class="text-slate-400 col-span-3">لا توجد كورسات متاحة حالياً.</p>`;
                    return;
                }

                let html = '';
                querySnapshot.forEach((doc) => {
                    const c = doc.data();
                    html += `
                        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col justify-between shadow-xl">
                            <div>
                                <span class="text-xs bg-sky-500/10 text-sky-400 px-3 py-1 rounded-full font-bold">${c.subject || 'مادة'}</span>
                                <h3 class="text-lg font-bold text-white mt-3">${c.title}</h3>
                                <p class="text-slate-400 text-sm mt-2">${c.description}</p>
                            </div>
                            <button class="mt-6 w-full bg-sky-500 text-slate-950 font-bold py-3 rounded-xl hover:bg-sky-400 transition flex items-center justify-center gap-2">
                                <i class="fa-solid fa-play"></i> مشاهدة المحاضرة
                            </button>
                        </div>
                    `;
                });
                grid.innerHTML = html;
            } catch (err) {
                grid.innerHTML = `<p class="text-red-400 col-span-3">حدث خطأ أثناء تحميل الكورسات. تأكد من صحة بيانات فايربيس في الكود.</p>`;
            }
        }

        loadStudentCourses();
    </script>
</body>
</html>
