<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المعلم - الإدارة المركزية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="w-10 h-10 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqapVeFxYyLJWryfqJrwBBmaIFcsCLn-w",
            authDomain: "educational-platform-f5e7e.firebaseapp.com",
            projectId: "educational-platform-f5e7e",
            storageBucket: "educational-platform-f5e7e.firebasestorage.app",
            messagingSenderId: "284103839814",
            appId: "1:284103839814:web:9b6abd761a585c46f03a47"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appDiv = document.getElementById('app');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                renderAdminDashboard(user);
            } else {
                renderLogin();
            }
        });

        function renderLogin() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                        <h2 class="text-2xl font-bold text-white mb-6 text-center">دخول لوحة التحكم</h2>
                        <form id="login-form" class="space-y-4">
                            <input type="email" id="email" required placeholder="البريد الإلكتروني" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <input type="password" id="password" required placeholder="كلمة المرور" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <button type="submit" class="w-full bg-sky-500 text-slate-950 font-bold py-3 rounded-xl transition">تسجيل الدخول</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            });
        }

        async function renderAdminDashboard(user) {
            appDiv.innerHTML = `
                <div class="min-h-screen p-6 md:p-10 max-w-7xl mx-auto space-y-8">
                    <header class="flex justify-between items-center pb-6 border-b border-slate-800">
                        <div>
                            <h1 class="text-2xl font-black text-white">لوحة تحكم المعلم المركزية</h1>
                            <p class="text-slate-400 text-sm">إدارة المحاضرات، الأكواد، ومتابعة الطلاب</p>
                        </div>
                        <button id="logout-btn" class="bg-rose-500/10 text-rose-400 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-rose-500 hover:text-white transition">تسجيل الخروج</button>
                    </header>

                    <!-- شبكة النشر والتوليد -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <!-- نشر محاضرة -->
                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                            <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-plus-circle text-sky-400 ml-2"></i>نشر محاضرة جديدة</h3>
                            <form id="course-form" class="space-y-4">
                                <input type="text" id="title" required placeholder="عنوان المحاضرة (مثال: الباب الأول فيزياء)" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                                <input type="text" id="subject" required placeholder="اسم المادة" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                                <select id="academicYear" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                    <option value="first">الصف الأول الثانوي</option>
                                    <option value="second">الصف الثاني الثانوي</option>
                                    <option value="third">الصف الثالث الثانوي</option>
                                </select>
                                <input type="text" id="videoUrl" required placeholder="رابط يوتيوب للفيديو" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                                <textarea id="description" placeholder="وصف المحاضرة..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm h-20"></textarea>
                                <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">نشر المحاضرة</button>
                            </form>
                        </div>

                        <!-- توليد أكواد تفعيل عشوائية -->
                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl flex flex-col justify-between">
                            <div>
                                <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-key text-amber-400 ml-2"></i>توليد أكواد تفعيل عشوائية وآمنة</h3>
                                <form id="code-form" class="space-y-4">
                                    <select id="codeCourseSelect" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                        <option value="">اختر المحاضرة المراد توليد كود لها</option>
                                    </select>
                                    <div class="flex gap-3">
                                        <input type="text" id="generatedCodeInput" readonly placeholder="الكود العشوائي سيظهر هنا" class="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3 text-amber-400 font-mono font-bold text-center text-sm" />
                                        <button type="button" id="generate-btn" class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-4 py-3 rounded-xl text-sm transition">توليد عشوائي</button>
                                    </div>
                                    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold py-3 rounded-xl transition">حفظ وتفعيل الكود في النظام</button>
                                </form>
                            </div>
                            <div class="mt-6 pt-4 border-t border-slate-800 text-xs text-slate-400">
                                * كل كود مخصص لجهاز/طالب واحد فقط (Single-Use).
                            </div>
                        </div>
                    </div>

                    <!-- قسم إدارة المحاضرات (ايقاف، تشغيل، تعديل، حذف) -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                        <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-book-open text-sky-400 ml-2"></i>إدارة المحاضرات المنشورة</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="admin-courses-grid">
                            <p class="text-slate-500">جاري تحميل المحاضرات...</p>
                        </div>
                    </div>

                    <!-- قسم إدارة الأكواد النشطة -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                        <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-list-check text-sky-400 ml-2"></i>إدارة الأكواد والتحكم فيها</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-right text-sm text-slate-300">
                                <thead class="bg-slate-950 text-slate-400 uppercase text-xs">
                                    <tr>
                                        <th class="p-3">الكود السري</th>
                                        <th class="p-3">حالة الاستخدام</th>
                                        <th class="p-3">مستخدم بواسطة (ID)</th>
                                        <th class="p-3">إجراءات التحكم</th>
                                    </tr>
                                </thead>
                                <tbody id="codes-table-body">
                                    <tr><td colspan="4" class="p-4 text-center text-slate-500">جاري تحميل الأكواد...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- قسم إدارة الطلاب الشاملة وتصدير Excel -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
                            <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-users text-sky-400 ml-2"></i>سجل الطلاب الكامل وبياناتهم</h3>
                            <button id="export-excel-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-2.5 rounded-xl text-xs flex items-center gap-2 transition">
                                <i class="fa-solid fa-file-excel"></i> تنزيل نسخة احتياطية (Excel / CSV)
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-right text-sm text-slate-300">
                                <thead class="bg-slate-950 text-slate-400 uppercase text-xs">
                                    <tr>
                                        <th class="p-3">اسم الطالب الرباعي</th>
                                        <th class="p-3">هاتف الطالب / الأب / الأم</th>
                                        <th class="p-3">الرقم القومي</th>
                                        <th class="p-3">المدرسة والمحافظة</th>
                                        <th class="p-3">السنة الدراسية</th>
                                        <th class="p-3">التحكم (حظر / تفعيل)</th>
                                    </tr>
                                </thead>
                                <tbody id="students-table-body">
                                    <tr><td colspan="6" class="p-4 text-center text-slate-500">جاري تحميل بيانات الطلاب...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

            // توليد كود عشوائي فريد من 6 أرقام
            document.getElementById('generate-btn').addEventListener('click', () => {
                const randomCode = Math.floor(100000 + Math.random() * 900000).toString();
                document.getElementById('generatedCodeInput').value = randomCode;
            });

            // نشر المحاضرة
            document.getElementById('course-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await addDoc(collection(db, "courses"), {
                    title: document.getElementById('title').value,
                    subject: document.getElementById('subject').value,
                    academicYear: document.getElementById('academicYear').value,
                    videoUrl: document.getElementById('videoUrl').value,
                    description: document.getElementById('description').value,
                    isActive: true, // حالة المحاضرة (نشطة افتراضياً)
                    createdAt: new Date()
                });
                alert("تم بنجاح نشر المحاضرة!");
                document.getElementById('course-form').reset();
                loadAdminData();
            });

            // حفظ الكود العشوائي
            document.getElementById('code-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const courseId = document.getElementById('codeCourseSelect').value;
                const code = document.getElementById('generatedCodeInput').value;
                if (!code) {
                    alert("الرجاء توليد كود أولاً!");
                    return;
                }

                await addDoc(collection(db, "activation_codes"), {
                    code: code,
                    courseId: courseId,
                    isUsed: false,
                    usedBy: null,
                    createdAt: new Date()
                });
                alert("تم حفظ وتفعيل الكود بنجاح!");
                document.getElementById('code-form').reset();
                document.getElementById('generatedCodeInput').value = "";
                loadAdminData();
            });

            loadAdminData();
        }

        let allStudentsData = [];

        async function loadAdminData() {
            // 1. تحميل وتحديث عرض الكورسات في الداشبورد
            const coursesSnap = await getDocs(collection(db, "courses"));
            const select = document.getElementById('codeCourseSelect');
            const coursesGrid = document.getElementById('admin-courses-grid');
            
            let selectHtml = '<option value="">اختر المحاضرة المراد توليد كود لها</option>';
            let coursesHtml = '';

            coursesSnap.forEach(docSnap => {
                const c = docSnap.data();
                const id = docSnap.id;
                const isActive = c.isActive !== false; // افتراضي نشط

                selectHtml += `<option value="${id}">${c.title} (${c.subject})</option>`;
                
                coursesHtml += `
                    <div class="bg-slate-950 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs bg-sky-500/10 text-sky-400 px-2.5 py-1 rounded-lg font-bold">${c.subject}</span>
                                <span class="text-xs px-2 py-0.5 rounded-md font-bold ${isActive ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}">
                                    ${isActive ? 'نشطة' : 'متوقفة'}
                                </span>
                            </div>
                            <h4 class="text-base font-bold text-white">${c.title}</h4>
                            <p class="text-slate-400 text-xs mt-1">السنة: ${c.academicYear}</p>
                        </div>
                        <div class="mt-4 flex gap-2">
                            <button onclick="window.toggleCourseStatus('${id}', ${isActive})" class="flex-1 bg-slate-800 hover:bg-slate-700 text-xs py-2 rounded-xl font-bold transition">
                                ${isActive ? 'إيقاف' : 'تشغيل'}
                            </button>
                            <button onclick="window.deleteCourse('${id}')" class="bg-rose-500/10 text-rose-400 text-xs px-3 py-2 rounded-xl font-bold hover:bg-rose-500 hover:text-white transition">حذف</button>
                        </div>
                    </div>
                `;
            });
            if(select) select.innerHTML = selectHtml;
            if(coursesGrid) coursesGrid.innerHTML = coursesHtml || '<p class="text-slate-500 col-span-full">لا توجد محاضرات منشورة</p>';

            // 2. تحميل الأكواد من جدول activation_codes
            const codesSnap = await getDocs(collection(db, "activation_codes"));
            const codesTbody = document.getElementById('codes-table-body');
            let codesHtml = '';
            codesSnap.forEach(docSnap => {
                const codeObj = docSnap.data();
                const codeId = docSnap.id;
                codesHtml += `
                    <tr class="border-b border-slate-800/60 hover:bg-slate-800/30">
                        <td class="p-3 font-mono text-amber-400 font-bold">${codeObj.code}</td>
                        <td class="p-3">
                            ${codeObj.isUsed ? '<span class="bg-rose-500/10 text-rose-400 px-2.5 py-1 rounded-lg text-xs font-bold">مستخدم</span>' : '<span class="bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-lg text-xs font-bold">متاح</span>'}
                        </td>
                        <td class="p-3 text-xs text-slate-400 truncate max-w-[120px]">${codeObj.usedBy || 'لا يوجد'}</td>
                        <td class="p-3 flex gap-2">
                            <button onclick="window.deleteCode('${codeId}')" class="bg-rose-500/10 text-rose-400 px-3 py-1 rounded-lg text-xs font-bold hover:bg-rose-500 hover:text-white transition">حذف</button>
                        </td>
                    </tr>
                `;
            });
            if(codesTbody) codesTbody.innerHTML = codesHtml || '<tr><td colspan="4" class="p-4 text-center text-slate-500">لا توجد أكواد مولدة</td></tr>';

            // 3. تحميل بيانات الطلاب بالكامل
            const usersSnap = await getDocs(collection(db, "users"));
            const studentsTbody = document.getElementById('students-table-body');
            let studentsHtml = '';
            allStudentsData = [];

            usersSnap.forEach(docSnap => {
                const st = docSnap.data();
                const stId = docSnap.id;
                allStudentsData.push({ id: stId, ...st });

                const isBlocked = st.isBlocked || false;
                studentsHtml += `
                    <tr class="border-b border-slate-800/60 hover:bg-slate-800/30">
                        <td class="p-3 font-bold text-white">${st.fullName || 'بدون اسم'}</td>
                        <td class="p-3 text-xs">
                            طالب: <span class="font-mono text-sky-400">${st.studentPhone || '-'}</span><br>
                            أب: <span class="font-mono">${st.fatherPhone || '-'}</span> | أم: <span class="font-mono">${st.motherPhone || '-'}</span>
                        </td>
                        <td class="p-3 font-mono text-xs">${st.nationalId || '-'}</td>
                        <td class="p-3 text-xs">${st.school || '-'} (${st.governorate || '-'})</td>
                        <td class="p-3 text-xs font-bold">${st.academicYear === 'third' ? 'الثالث الثانوي' : st.academicYear === 'second' ? 'الثاني الثانوي' : 'الأول الثانوي'}</td>
                        <td class="p-3 flex items-center gap-2">
                            ${isBlocked ? '<span class="text-rose-400 text-xs font-bold">محظور</span>' : '<span class="text-emerald-400 text-xs font-bold">نشط</span>'}
                            <button onclick="window.toggleBlock('${stId}', ${isBlocked})" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-lg font-bold transition">
                                ${isBlocked ? 'إلغاء الحظر' : 'حظر'}
                            </button>
                        </td>
                    </tr>
                `;
            });
            if(studentsTbody) studentsTbody.innerHTML = studentsHtml || '<tr><td colspan="6" class="p-4 text-center text-slate-500">لا توجد بيانات طلاب مسجلين</td></tr>';
        }

        // إيقاف أو تشغيل المحاضرة
        window.toggleCourseStatus = async function(id, currentStatus) {
            await updateDoc(doc(db, "courses", id), {
                isActive: !currentStatus
            });
            loadAdminData();
        };

        // حذف محاضرة
        window.deleteCourse = async function(id) {
            if(confirm("هل أنت متأكد من حذف هذه المحاضرة نهائياً؟")) {
                await deleteDoc(doc(db, "courses", id));
                loadAdminData();
            }
        };

        // حذف كود
        window.deleteCode = async function(id) {
            if(confirm("هل أنت متأكد من حذف هذا الكود نهائياً؟")) {
                await deleteDoc(doc(db, "activation_codes", id));
                loadAdminData();
            }
        };

        // حظر / إلغاء حظر طالب
        window.toggleBlock = async function(userId, currentStatus) {
            await updateDoc(doc(db, "users", userId), {
                isBlocked: !currentStatus
            });
            loadAdminData();
        };

        // تصدير ملف إكسيل CSV كامل ببيانات الطلاب
        document.getElementById('export-excel-btn')?.addEventListener('click', () => {
            if (allStudentsData.length === 0) {
                alert("لا توجد بيانات طلاب لتصديرها!");
                return;
            }
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
            csvContent += "الاسم الرباعي,هاتف الطالب,هاتف الأب,هاتف الأم,الرقم القومي,المدرسة,المحافظة,السنة الدراسية\n";

            allStudentsData.forEach(st => {
                let row = `"${st.fullName || ''}","${st.studentPhone || ''}","${st.fatherPhone || ''}","${st.motherPhone || ''}","${st.nationalId || ''}","${st.school || ''}","${st.governorate || ''}","${st.academicYear || ''}"`;
                csvContent += row + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "students_database.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
