<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المعلم - الإدارة المركزية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <!-- نافذة التنبيهات العامة بـ Z-Index عالي جداً -->
    <div id="custom-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[9999] hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
            <div id="modal-icon" class="w-14 h-14 bg-sky-500/20 text-sky-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-circle-info"></i>
            </div>
            <h3 id="modal-title" class="text-lg font-bold text-white mb-2">تنبيه النظام</h3>
            <p id="modal-text" class="text-slate-400 text-sm mb-6">رسالة توضيحية...</p>
            <div id="modal-buttons">
                <button onclick="closeModal()" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">حسناً</button>
            </div>
        </div>
    </div>

    <!-- نافذة تعديل المحاضرة -->
    <div id="edit-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-lg w-full shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-4"><i class="fa-solid fa-pen text-sky-400 ml-2"></i>تعديل بيانات المحاضرة</h3>
            <form id="edit-course-form" class="space-y-4">
                <input type="hidden" id="edit-course-id">
                <input type="text" id="edit-title" required placeholder="عنوان المحاضرة" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                <input type="text" id="edit-subject" required placeholder="اسم المادة" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                <select id="edit-academicYear" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                    <option value="first">الصف الأول الثانوي</option>
                    <option value="second">الصف الثاني الثانوي</option>
                    <option value="third">الصف الثالث الثانوي</option>
                </select>
                <input type="text" id="edit-videoUrl" required placeholder="رابط يوتيوب" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                <textarea id="edit-description" placeholder="وصف المحاضرة..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm h-20"></textarea>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold py-3 rounded-xl transition">حفظ التعديلات</button>
                    <button type="button" onclick="closeEditModal()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-5 py-3 rounded-xl transition">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <!-- نافذة تعديل الإشعار -->
    <div id="edit-notif-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-lg w-full shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-4"><i class="fa-solid fa-bell text-sky-400 ml-2"></i>تعديل التنبيه</h3>
            <form id="edit-notif-form" class="space-y-4">
                <input type="hidden" id="edit-notif-id">
                <input type="text" id="edit-notif-title" required placeholder="عنوان التنبيه" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                <select id="edit-notif-target" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                    <option value="all">جميع السنوات الدراسية</option>
                    <option value="first">الصف الأول الثانوي فقط</option>
                    <option value="second">الصف الثاني الثانوي فقط</option>
                    <option value="third">الصف الثالث الثانوي فقط</option>
                </select>
                <textarea id="edit-notif-msg" required placeholder="نص التنبيه..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm h-20"></textarea>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold py-3 rounded-xl transition">حفظ التعديل</button>
                    <button type="button" onclick="document.getElementById('edit-notif-modal').classList.add('hidden')" class="bg-slate-800 text-white font-bold px-5 py-3 rounded-xl">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="w-10 h-10 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, getDocs, addDoc, deleteDoc, doc, updateDoc, arrayRemove, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqapVeFxYyLJWryfqJrwBBmaIFcsCLn-w",
            authDomain: "educational-platform-f5e7e.firebaseapp.com",
            projectId: "educational-platform-f5e7e",
            storageBucket: "educational-platform-f5e7e.firebasestorage.app",
            messagingSenderId: "284103839814",
            appId: "1:284103839814:web:9b6abd761a585c46f03a47"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const appDiv = document.getElementById('app');

        window.showModal = function(title, text, type = "sky", onConfirm = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            const iconDiv = document.getElementById('modal-icon');
            const buttonsDiv = document.getElementById('modal-buttons');

            if(type === "rose") {
                iconDiv.className = "w-14 h-14 bg-rose-500/20 text-rose-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl";
                iconDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            } else {
                iconDiv.className = "w-14 h-14 bg-sky-500/20 text-sky-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl";
                iconDiv.innerHTML = '<i class="fa-solid fa-circle-info"></i>';
            }

            if (onConfirm) {
                buttonsDiv.innerHTML = `
                    <div class="flex gap-2">
                        <button id="modal-confirm-btn" class="flex-1 bg-rose-500 hover:bg-rose-400 text-white font-extrabold py-3 rounded-xl transition">تأكيد</button>
                        <button onclick="closeModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-extrabold py-3 rounded-xl transition">إلغاء</button>
                    </div>
                `;
                document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); closeModal(); };
            } else {
                buttonsDiv.innerHTML = `<button onclick="closeModal()" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">حسناً</button>`;
            }
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        window.closeModal = function() { document.getElementById('custom-modal').classList.add('hidden'); }
        window.closeEditModal = function() { document.getElementById('edit-modal').classList.add('hidden'); }

        onAuthStateChanged(auth, (user) => {
            if (user) { renderAdminDashboard(user); } else { renderLogin(); }
        });

        function renderLogin() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                        <h2 class="text-2xl font-bold text-white mb-6 text-center">دخول لوحة التحكم</h2>
                        <form id="login-form" class="space-y-4">
                            <input type="email" id="email" required placeholder="البريد الإلكتروني" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <input type="password" id="password" required placeholder="كلمة المرور" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <button type="submit" class="w-full bg-sky-500 text-slate-950 font-bold py-3 rounded-xl transition">تسجيل الدخول</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            });
        }

        function renderAdminDashboard(user) {
            appDiv.innerHTML = `
                <div class="min-h-screen p-6 md:p-10 max-w-7xl mx-auto space-y-8">
                    <header class="flex justify-between items-center pb-6 border-b border-slate-800">
                        <div>
                            <h1 class="text-2xl font-black text-white">لوحة تحكم المعلم المركزية</h1>
                            <p class="text-slate-400 text-sm">نظام إدارة التعلم المتكامل (LMS) مع رفع ملفات PDF الآمنة</p>
                        </div>
                        <button id="logout-btn" class="bg-rose-500/10 text-rose-400 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-rose-500 hover:text-white transition">تسجيل الخروج</button>
                    </header>

                    <!-- النشر والتوليد -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                            <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-plus-circle text-sky-400 ml-2"></i>نشر محاضرة جديدة</h3>
                            <form id="course-form" class="space-y-4">
                                <input type="text" id="title" required placeholder="عنوان المحاضرة (مثال: الباب الأول فيزياء)" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                                <input type="text" id="subject" required placeholder="اسم المادة" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                                <select id="academicYear" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                    <option value="first">الصف الأول الثانوي</option>
                                    <option value="second">الصف الثاني الثانوي</option>
                                    <option value="third">الصف الثالث الثانوي</option>
                                </select>
                                <input type="text" id="videoUrl" required placeholder="رابط يوتيوب للفيديو" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                                <textarea id="description" placeholder="وصف المحاضرة..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm h-20"></textarea>
                                <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">نشر المحاضرة</button>
                            </form>
                        </div>

                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl flex flex-col justify-between space-y-6">
                            <div>
                                <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-key text-amber-400 ml-2"></i>توليد أكواد تفعيل عشوائية</h3>
                                <form id="code-form" class="space-y-4">
                                    <select id="codeCourseSelect" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                        <option value="">اختر المحاضرة المراد توليد كود لها</option>
                                    </select>
                                    <div class="flex gap-3">
                                        <input type="text" id="generatedCodeInput" readonly placeholder="الكود العشوائي" class="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3 text-amber-400 font-mono font-bold text-center text-sm" />
                                        <button type="button" id="generate-btn" class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-4 py-3 rounded-xl text-sm transition">توليد</button>
                                    </div>
                                    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold py-3 rounded-xl transition">حفظ وتفعيل الكود</button>
                                </form>
                            </div>

                            <div class="pt-4 border-t border-slate-800">
                                <h3 class="text-md font-bold text-white mb-3"><i class="fa-solid fa-bell text-sky-400 ml-2"></i>نشر تنبيه / إشعار للطلاب</h3>
                                <form id="notification-form" class="space-y-3">
                                    <input type="text" id="notif-title" required placeholder="عنوان التنبيه" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-xs" />
                                    <select id="notif-target" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-xs">
                                        <option value="all">جميع السنوات الدراسية</option>
                                        <option value="first">الصف الأول الثانوي فقط</option>
                                        <option value="second">الصف الثاني الثانوي فقط</option>
                                        <option value="third">الصف الثالث الثانوي فقط</option>
                                    </select>
                                    <textarea id="notif-msg" required placeholder="نص التنبيه..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-xs h-16"></textarea>
                                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded-xl transition text-xs">نشر الإشعار الآن</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- رفع ملف PDF حقيقي + سؤال اختبار -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                            <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-file-pdf text-rose-400 ml-2"></i>رفع ملف PDF للمحاضرة</h3>
                            <form id="file-form" class="space-y-4">
                                <select id="fileCourseSelect" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                    <option value="">اختر المحاضرة المستهدفة</option>
                                </select>
                                <input type="text" id="fileTitle" required placeholder="عنوان الملزمة (مثال: ملخص الباب الأول)" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                                <div>
                                    <label class="block text-xs text-slate-400 mb-1">اختر ملف PDF من جهازك:</label>
                                    <input type="file" id="pdfFileInput" accept="application/pdf" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm file:bg-rose-600 file:text-white file:border-none file:rounded-lg file:px-4 file:py-2 file:cursor-pointer" />
                                </div>
                                <button type="submit" class="w-full bg-rose-600 hover:bg-rose-500 text-white font-extrabold py-3 rounded-xl transition">رفع وربط الملف بالمحاضرة</button>
                            </form>
                        </div>

                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                            <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-clipboard-question text-indigo-400 ml-2"></i>إضافة سؤال اختبار + وقت الامتحان</h3>
                            <form id="quiz-form" class="space-y-3">
                                <select id="quizCourseSelect" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-xs">
                                    <option value="">اختر المحاضرة للاختبار</option>
                                </select>
                                <div>
                                    <label class="block text-[11px] text-slate-400 mb-1">مدة الامتحان (بالدقائق):</label>
                                    <input type="number" id="quizDuration" min="1" value="10" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2 text-white text-xs" />
                                </div>
                                <input type="text" id="quizQuestion" required placeholder="نص السؤال" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-xs" />
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="text" id="opt0" required placeholder="الخيار الأول" class="bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-xs" />
                                    <input type="text" id="opt1" required placeholder="الخيار الثاني" class="bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-xs" />
                                    <input type="text" id="opt2" required placeholder="الخيار الثالث" class="bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-xs" />
                                    <input type="text" id="opt3" required placeholder="الخيار الرابع" class="bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-xs" />
                                </div>
                                <select id="quizCorrect" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-white text-xs">
                                    <option value="0">الإجابة الصحيحة: الخيار الأول</option>
                                    <option value="1">الإجابة الصحيحة: الخيار الثاني</option>
                                    <option value="2">الإجابة الصحيحة: الخيار الثالث</option>
                                    <option value="3">الإجابة الصحيحة: الخيار الرابع</option>
                                </select>
                                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-extrabold py-3 rounded-xl transition text-xs">إضافة السؤال</button>
                            </form>
                        </div>
                    </div>

                    <!-- إدارة التنبيهات المنشورة -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl space-y-4">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                            <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-bullhorn text-sky-400 ml-2"></i>التنبيهات المنشورة</h3>
                            <div class="flex gap-3 w-full md:w-auto">
                                <select id="filter-notif-target" class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-white text-xs flex-1 md:w-48">
                                    <option value="all">كل الإشعارات</option>
                                    <option value="all_years">جميع السنوات</option>
                                    <option value="first">الصف الأول الثانوي</option>
                                    <option value="second">الصف الثاني الثانوي</option>
                                    <option value="third">الصف الثالث الثانوي</option>
                                </select>
                                <button onclick="window.deleteAllNotifications()" class="bg-rose-500/10 hover:bg-rose-500 text-rose-400 hover:text-white font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-2 transition">
                                    <i class="fa-solid fa-trash-can"></i> حذف الكل
                                </button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-right text-sm text-slate-300">
                                <thead class="bg-slate-950 text-slate-400 uppercase text-xs">
                                    <tr>
                                        <th class="p-3">العنوان</th>
                                        <th class="p-3">مستهدفون</th>
                                        <th class="p-3">الرسالة</th>
                                        <th class="p-3">الإجراءات</th>
                                    </tr>
                                </thead>
                                <tbody id="admin-notifications-body">
                                    <tr><td colspan="4" class="p-4 text-center text-slate-500">جاري التحميل...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- نتائج اختبارات الطلاب -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl space-y-4">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                            <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-square-poll-vertical text-emerald-400 ml-2"></i>درجات ونتائج اختبارات الطلاب ومستوى التقدم</h3>
                            <select id="filter-results-course" class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-white text-xs">
                                <option value="all">جميع المحاضرات</option>
                            </select>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-right text-sm text-slate-300">
                                <thead class="bg-slate-950 text-slate-400 uppercase text-xs">
                                    <tr>
                                        <th class="p-3">اسم الطالب</th>
                                        <th class="p-3">اسم المحاضرة</th>
                                        <th class="p-3">الدرجة</th>
                                        <th class="p-3">تقييم مستوى التقدم</th>
                                        <th class="p-3">إعادة الامتحان</th>
                                        <th class="p-3">الإجراء</th>
                                    </tr>
                                </thead>
                                <tbody id="quiz-results-body">
                                    <tr><td colspan="6" class="p-4 text-center text-slate-500">جاري التحميل...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- طلبات تعديل البيانات -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl space-y-4">
                        <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-user-pen text-amber-400 ml-2"></i>طلبات تعديل بيانات الطلاب المعلقة</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-right text-sm text-slate-300">
                                <thead class="bg-slate-950 text-slate-400 uppercase text-xs">
                                    <tr>

            document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

            document.getElementById('course-form').addEventListener('submit', async (e) => {

                await addDoc(collection(db, "courses"), {
                    title: document.getElementById('title').value,

                    academicYear: document.getElementById('academicYear').value,

            document.getElementById('code-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const courseId = document.getElementById('codeCourseSelect').value;
                const code = document.getElementById('generatedCodeInput').value;
                if (!code) { showModal("تنبيه", "الرجاء توليد كود أولاً!", "rose"); return; }
                await addDoc(collection(db, "activation_codes"), {
                    code, courseId, isUsed: false, isDisabled: false, usedBy: null, createdAt: new Date()
                });
                showModal("تم بنجاح", "تم تفعيل الكود!");
                document.getElementById('code-form').reset();
                document.getElementById('generatedCodeInput').value = "";
            });

            document.getElementById('file-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const courseId = document.getElementById('fileCourseSelect').value;
                const title = document.getElementById('fileTitle').value;
                const fileInput = document.getElementById('pdfFileInput');
                
                if (!fileInput.files[0]) {
                    showModal("تنبيه", "الرجاء اختيار ملف PDF!", "rose");
                    return;
                }

                showModal("جاري الرفع", "يتم الآن رفع ملف PDF السحابي...", "sky");

                try {
                    const file = fileInput.files[0];
                    const storageRef = ref(storage, `course_files/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    const fileUrl = await getDownloadURL(storageRef);

                    const target = adminCourses.find(c => c.id === courseId);
                    const currentFiles = target ? (target.files || []) : [];
                    currentFiles.push({ id: Date.now().toString(), title, url: fileUrl });
                    await updateDoc(doc(db, "courses", courseId), { files: currentFiles });
                    
                    showModal("تم بنجاح", "تم رفع وإرفاق ملف PDF بنجاح!");
                    document.getElementById('file-form').reset();
                } catch (err) {
                    showModal("خطأ", "فشل رفع الملف: " + err.message, "rose");

                const question = document.getElementById('quizQuestion').value;
                const options = [
                    document.getElementById('opt0').value, document.getElementById('opt1').value,
                    document.getElementById('opt2').value, document.getElementById('opt3'].value
                ];
                const correct = parseInt(document.getElementById('quizCorrect').value);

                const target = adminCourses.find(c => c.id === courseId);
                const currentQuiz = target ? (target.quiz || []) : [];
                currentQuiz.push({ id: Date.now().toString(), question, options, correct });

                await updateDoc(doc(db, "courses", courseId), { quiz: currentQuiz, quizDuration: duration });

                const question = document.getElementById('edit-quiz-question').value;

                    document.getElementById('edit-opt2').value, document.getElementById('edit-opt3').value
                ];

                const target = adminCourses.find(c => c.id === courseId);
                if (target && target.quiz) {
                    const updatedQuiz = target.quiz.map(q => q.id === qId ? { id: qId, question, options, correct } : q);

            document.getElementById('export-excel-btn')?.addEventListener('click', async () => {

                    usersSnap.forEach(docSnap => {
                        const st = docSnap.data();
                        csvContent += `"${st.fullName || ''}","${st.studentPhone || ''}","${st.fatherPhone || ''}","${st.motherPhone || ''}","${st.nationalId || ''}","${st.school || ''}","${st.governorate || ''}","${st.academicYear || ''}"\n`;
                    });
                    const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });

                    link.setAttribute("href", url); link.setAttribute("download", "students_database.csv");
                    document.body.appendChild(link); link.click(); document.body.removeChild(link);

            setupAdminRealtimeData();

        let adminCourses = [];
        let adminCodes = [];
        let adminUsers = [];
        let adminNotifications = [];
        let adminRequests = [];
        let adminResults = [];
        let coursesMap = {};

        function setupAdminRealtimeData() {
            onSnapshot(collection(db, "courses"), (snap) => {
                adminCourses = [];
                snap.forEach(d => adminCourses.push({ id: d.id, ...d.data() }));
                renderAdminUI();
            });
            onSnapshot(collection(db, "activation_codes"), (snap) => {
                adminCodes = [];
                snap.forEach(d => adminCodes.push({ id: d.id, ...d.data() }));
                renderAdminUI();
            });
            onSnapshot(collection(db, "users"), (snap) => {
                adminUsers = [];
                snap.forEach(d => adminUsers.push({ id: d.id, ...d.data() }));
                renderAdminUI();
            });
            onSnapshot(collection(db, "notifications"), (snap) => {
                adminNotifications = [];
                snap.forEach(d => adminNotifications.push({ id: d.id, ...d.data() }));
                renderAdminUI();
            });
            onSnapshot(collection(db, "profile_requests"), (snap) => {
                adminRequests = [];
                snap.forEach(d => adminRequests.push({ id: d.id, ...d.data() }));
                renderAdminUI();
            });
            onSnapshot(collection(db, "quiz_results"), (snap) => {
                adminResults = [];
                snap.forEach(d => adminResults.push({ id: d.id, ...d.data() }));
                renderAdminUI();

        function renderAdminUI() {

            let resultsFilterHtml = '<option value="all">جميع المحاضرات</option>';

                const yearText = c.academicYear === 'third' ? 'الثالث الثانوي' : c.academicYear === 'second' ? 'الثاني الثانوي' : 'الأول الثانوي';
                coursesMap[c.id] = { title: c.title, year: yearText };

                selectHtml += `<option value="${c.id}">${c.title}</option>`;

                resultsFilterHtml += `<option value="${c.id}">${c.title}</option>`;

                if (yearFilter === 'all' || c.academicYear === yearFilter) {

                    `).join('') || '<span class="text-slate-500 text-[11px]">لا توجد ملفات</span>';

                    let quizListHtml = (c.quiz || []).map((q, qIdx) => `

                            <td class="p-3 font-mono text-amber-400 font-bold">${codeObj.code}</td>
                            <td class="p-3 text-xs text-sky-300 font-semibold">${courseLabel}</td>
                            <td class="p-3">${isUsed ? '<span class="bg-rose-500/10 text-rose-400 px-2.5 py-1 rounded-lg text-xs font-bold">مستخدم</span>' : (isDisabled ? '<span class="bg-amber-500/10 text-amber-400 px-2.5 py-1 rounded-lg text-xs font-bold">معطل</span>' : '<span class="bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-lg text-xs font-bold">متاح</span>')}</td>
                            <td class="p-3 text-xs text-slate-300">${studentDetails}</td>
                            <td class="p-3 flex gap-2">
                                <button onclick="window.toggleCodeStatus('${codeObj.id}', ${isDisabled})" class="bg-slate-800 px-3 py-1 rounded-lg text-xs font-bold">${isDisabled ? 'تفعيل' : 'تعطيل'}</button>
                                <button onclick="window.deleteCode('${codeObj.id}', '${codeObj.usedBy || ''}', '${codeObj.courseId || ''}')" class="bg-rose-500/10 text-rose-400 px-3 py-1 rounded-lg text-xs font-bold">حذف</button>
                            </td>
                        </tr>
                    `;
                }
            });
            if(codesTbody) codesTbody.innerHTML = codesHtml || '<tr><td colspan="5" class="p-4 text-center text-slate-500">لا توجد أكواد مطابقة</td></tr>';

            const notifBody = document.getElementById('admin-notifications-body');
            const notifFilter = document.getElementById('filter-notif-target')?.value || 'all';
            let notifHtml = '';
            adminNotifications.forEach(n => {
                const targetText = n.targetYear === 'all' ? 'جميع السنوات' : (n.targetYear === 'third' ? 'الثالث الثانوي' : n.targetYear === 'second' ? 'الثاني الثانوي' : 'الأول الثانوي');
                let matchesNotifFilter = true;
                if (notifFilter === 'all_years' && n.targetYear !== 'all') matchesNotifFilter = false;
                if (notifFilter !== 'all' && notifFilter !== 'all_years' && n.targetYear !== notifFilter) matchesNotifFilter = false;

                if (matchesNotifFilter) {
                    notifHtml += `
                        <tr class="border-b border-slate-800/60">
                            <td class="p-3 font-bold text-white">${n.title}</td>
                            <td class="p-3 text-xs text-sky-400">${targetText}</td>
                            <td class="p-3 text-xs truncate max-w-xs">${n.message}</td>
                            <td class="p-3 flex gap-2">
                                <button onclick="window.openEditNotifModal('${n.id}', '${n.title}', '${n.targetYear}', '${n.message}')" class="bg-sky-500/10 text-sky-400 px-3 py-1 rounded-lg text-xs font-bold">تعديل</button>
                                <button onclick="window.deleteNotification('${n.id}')" class="bg-rose-500/10 text-rose-400 px-3 py-1 rounded-lg text-xs font-bold">حذف</button>
                            </td>
                        </tr>
                    `;
                }
            });
            if(notifBody) notifBody.innerHTML = notifHtml || '<tr><td colspan="4" class="p-4 text-center text-slate-500">لا توجد تنبيهات</td></tr>';

            const resultsBody = document.getElementById('quiz-results-body');
            const courseFilterId = document.getElementById('filter-results-course')?.value || 'all';
            let resHtml = '';
            adminResults.forEach(r => {
                const canRetake = r.canRetake || false;
                if (courseFilterId === 'all' || r.courseId === courseFilterId) {
                    const percentage = Math.round((r.score / r.total) * 100);
                    let evaluation = percentage >= 85 ? 'ممتاز' : percentage >= 65 ? 'جيد جداً' : percentage >= 50 ? 'مقبول' : 'راسب';
                    resHtml += `
                        <tr class="border-b border-slate-800/60 hover:bg-slate-800/30">
                            <td class="p-3 font-bold text-white">${r.studentName}</td>
                            <td class="p-3 text-xs text-sky-400">${r.courseTitle}</td>
                            <td class="p-3 font-mono font-bold text-amber-400">${r.score} / ${r.total} (${percentage}%)</td>
                            <td class="p-3"><span class="text-xs px-2.5 py-1 rounded-lg border font-bold">${evaluation}</span></td>
                            <td class="p-3"><button onclick="window.toggleQuizRetake('${r.id}', ${canRetake})" class="px-3 py-1.5 rounded-lg text-xs font-bold transition ${canRetake ? 'bg-amber-500 text-slate-950' : 'bg-slate-800 text-slate-300'}">${canRetake ? 'مسموح بالإعادة' : 'السماح بالإعادة'}</button></td>
                            <td class="p-3"><button onclick="window.deleteQuizResult('${r.id}')" class="bg-rose-500/10 text-rose-400 px-3 py-1 rounded-lg text-xs font-bold">حذف</button></td>
                        </tr>
                    `;
                }
            });
            if(resultsBody) resultsBody.innerHTML = resHtml || '<tr><td colspan="6" class="p-4 text-center text-slate-500">لا توجد نتائج مسجلة</td></tr>';
        }

        window.openEditQuizModal = function(courseId, qId, question, correct, options) {
            document.getElementById('edit-quiz-course-id').value = courseId;
            document.getElementById('edit-quiz-id').value = qId;
            document.getElementById('edit-quiz-question').value = question;
            document.getElementById('edit-opt0').value = options[0] || '';
            document.getElementById('edit-opt1').value = options[1] || '';
            document.getElementById('edit-opt2').value = options[2] || '';
            document.getElementById('edit-opt3').value = options[3] || '';
            document.getElementById('edit-quiz-correct').value = correct;
            document.getElementById('edit-quiz-modal').classList.remove('hidden');
        }

        window.deleteCourseFile = async function(courseId, fileId) {
            showModal("تأكيد الحذف", "حذف هذا الملف؟", "rose", async () => {
                const target = adminCourses.find(c => c.id === courseId);
                if(target && target.files) {
                    const newFiles = target.files.filter(f => f.id !== fileId);
                    await updateDoc(doc(db, "courses", courseId), { files: newFiles });
                }
            });
        }

        window.deleteQuizQuestion = async function(courseId, qId) {
            showModal("تأكيد الحذف", "حذف هذا السؤال؟", "rose", async () => {
                const target = adminCourses.find(c => c.id === courseId);
                if(target && target.quiz) {
                    const newQuiz = target.quiz.filter(q => q.id !== qId);
                    await updateDoc(doc(db, "courses", courseId), { quiz: newQuiz });
                }
            });
        }

        window.toggleQuizRetake = async function(resultId, currentStatus) {
            await updateDoc(doc(db, "quiz_results", resultId), { canRetake: !currentStatus });
        };

        window.deleteQuizResult = async function(resultId) {
            showModal("تأكيد الحذف", "حذف هذه النتيجة؟", "rose", async () => { await deleteDoc(doc(db, "quiz_results", resultId)); });
        };

        window.deleteAllNotifications = async function() {
            showModal("تأكيد الحذف", "حذف جميع الإشعارات؟", "rose", async () => {
                const promises = adminNotifications.map(n => deleteDoc(doc(db, "notifications", n.id)));
                await Promise.all(promises);
            });
        }

        window.openEditModal = function(id, title, subject, academicYear, videoUrl, description) {
            document.getElementById('edit-course-id').value = id;
            document.getElementById('edit-title').value = title;
            document.getElementById('edit-subject').value = subject;
            document.getElementById('edit-academicYear').value = academicYear;
            document.getElementById('edit-videoUrl').value = videoUrl;
            document.getElementById('edit-description').value = description;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        window.openEditNotifModal = function(id, title, targetYear, message) {
            document.getElementById('edit-notif-id').value = id;
            document.getElementById('edit-notif-title').value = title;
            document.getElementById('edit-notif-target').value = targetYear;
            document.getElementById('edit-notif-msg').value = message;
            document.getElementById('edit-notif-modal').classList.remove('hidden');
        }

        window.toggleCourseStatus = async function(id, currentStatus) {
            await updateDoc(doc(db, "courses", id), { isActive: !currentStatus });
        };

        window.toggleCodeStatus = async function(id, currentStatus) {
            await updateDoc(doc(db, "activation_codes", id), { isDisabled: !currentStatus });
        };

        window.deleteCourse = async function(id) {
            showModal("تأكيد الحذف", "حذف المحاضرة؟", "rose", async () => { await deleteDoc(doc(db, "courses", id)); });
        };

        window.deleteNotification = async function(id) {
            showModal("تأكيد الحذف", "حذف التنبيه؟", "rose", async () => { await deleteDoc(doc(db, "notifications", id)); });
        };

        window.deleteCode = async function(id, usedByUserId, courseId) {
            showModal("تأكيد الحذف", "حذف الكود؟", "rose", async () => {
                if (usedByUserId && courseId) {
                    try { await updateDoc(doc(db, "users", usedByUserId), { unlockedCourses: arrayRemove(courseId) }); } catch(e){}
                }
                await deleteDoc(doc(db, "activation_codes", id));
            });
        };

        window.toggleDeviceBlock = async function(userId, currentStatus) {
            await updateDoc(doc(db, "users", userId), { deviceBlocked: !currentStatus });
        };

        window.approveRequest = async function(reqId, userId, newName, newStudentPhone, newFatherPhone, newMotherPhone, newSchool, newGovernorate) {
            await updateDoc(doc(db, "users", userId), {
                fullName: newName, studentPhone: newStudentPhone, fatherPhone: newFatherPhone,
                motherPhone: newMotherPhone, school: newSchool, governorate: newGovernorate
            });
            await updateDoc(doc(db, "profile_requests", reqId), { status: 'approved' });
            await addDoc(collection(db, "notifications"), {
                title: "تمت الموافقة على تعديل البيانات", message: "تم تحديث بياناتك بنجاح.", targetUserId: userId, createdAt: new Date()
            });
            showModal("تم", "تمت الموافقة بنجاح.");
        };

        window.rejectRequest = async function(reqId, userId) {
            await updateDoc(doc(db, "profile_requests", reqId), { status: 'rejected' });
            await addDoc(collection(db, "notifications"), {
                title: "تم رفض طلب تعديل البيانات", message: "عذراً، تم رفض طلبك.", targetUserId: userId, createdAt: new Date()
            });
            showModal("تم", "تم الرفض.");
        };
    </script>
</body>
</html>
