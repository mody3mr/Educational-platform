<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المعلم - الإدارة المركزية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <!-- نافذة منبثقة مخصصة للتنبيهات والتأكيد (Modal) -->
    <div id="custom-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-sm w-full text-center shadow-2xl">
            <div id="modal-icon" class="w-14 h-14 bg-sky-500/20 text-sky-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fa-solid fa-circle-info"></i>
            </div>
            <h3 id="modal-title" class="text-lg font-bold text-white mb-2">تنبيه النظام</h3>
            <p id="modal-text" class="text-slate-400 text-sm mb-6">رسالة توضيحية...</p>
            <div id="modal-buttons" class="flex gap-2">
                <button onclick="closeModal()" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">حسناً</button>
            </div>
        </div>
    </div>

    <!-- نافذة تعديل المحاضرة -->
    <div id="edit-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 max-w-lg w-full shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-4"><i class="fa-solid fa-pen text-sky-400 ml-2"></i>تعديل بيانات المحاضرة</h3>
            <form id="edit-course-form" class="space-y-4">
                <input type="hidden" id="edit-course-id">
                <input type="text" id="edit-title" required placeholder="عنوان المحاضرة" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                <input type="text" id="edit-subject" required placeholder="اسم المادة" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                <select id="edit-academicYear" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                    <option value="first">الصف الأول الثانوي</option>
                    <option value="second">الصف الثاني الثانوي</option>
                    <option value="third">الصف الثالث الثانوي</option>
                </select>
                <input type="text" id="edit-videoUrl" required placeholder="رابط يوتيوب" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                <textarea id="edit-description" placeholder="وصف المحاضرة..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm h-20"></textarea>
                <div class="flex gap-3">
                    <button type="submit" class="flex-1 bg-sky-500 hover:bg-sky-400 text-slate-950 font-bold py-3 rounded-xl transition">حفظ التعديلات</button>
                    <button type="button" onclick="closeEditModal()" class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-5 py-3 rounded-xl transition">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="w-10 h-10 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqapVeFxYyLJWryfqJrwBBmaIFcsCLn-w",
            authDomain: "educational-platform-f5e7e.firebaseapp.com",
            projectId: "educational-platform-f5e7e",
            storageBucket: "educational-platform-f5e7e.firebasestorage.app",
            messagingSenderId: "284103839814",
            appId: "1:284103839814:web:9b6abd761a585c46f03a47"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appDiv = document.getElementById('app');

        window.showModal = function(title, text, type = "sky", onConfirm = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            const iconDiv = document.getElementById('modal-icon');
            const buttonsDiv = document.getElementById('modal-buttons');

            if(type === "rose") {
                iconDiv.className = "w-14 h-14 bg-rose-500/20 text-rose-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl";
                iconDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            } else {
                iconDiv.className = "w-14 h-14 bg-sky-500/20 text-sky-400 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl";
                iconDiv.innerHTML = '<i class="fa-solid fa-circle-info"></i>';
            }

            if (onConfirm) {
                buttonsDiv.innerHTML = `
                    <button id="modal-confirm-btn" class="flex-1 bg-rose-500 hover:bg-rose-400 text-white font-extrabold py-3 rounded-xl transition">تأكيد</button>
                    <button onclick="closeModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-white font-extrabold py-3 rounded-xl transition">إلغاء</button>
                `;
                document.getElementById('modal-confirm-btn').onclick = () => {
                    onConfirm();
                    closeModal();
                };
            } else {
                buttonsDiv.innerHTML = `<button onclick="closeModal()" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">حسناً</button>`;
            }
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        window.closeModal = function() { document.getElementById('custom-modal').classList.add('hidden'); }
        window.closeEditModal = function() { document.getElementById('edit-modal').classList.add('hidden'); }

        onAuthStateChanged(auth, (user) => {
            if (user) { renderAdminDashboard(user); } else { renderLogin(); }
        });

        function renderLogin() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                        <h2 class="text-2xl font-bold text-white mb-6 text-center">دخول لوحة التحكم</h2>
                        <form id="login-form" class="space-y-4">
                            <input type="email" id="email" required placeholder="البريد الإلكتروني" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <input type="password" id="password" required placeholder="كلمة المرور" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm outline-none focus:border-sky-500" />
                            <button type="submit" class="w-full bg-sky-500 text-slate-950 font-bold py-3 rounded-xl transition">تسجيل الدخول</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            });
        }

        async function renderAdminDashboard(user) {
            appDiv.innerHTML = `
                <div class="min-h-screen p-6 md:p-10 max-w-7xl mx-auto space-y-8">
                    <header class="flex justify-between items-center pb-6 border-b border-slate-800">
                        <div>
                            <h1 class="text-2xl font-black text-white">لوحة تحكم المعلم المركزية</h1>
                            <p class="text-slate-400 text-sm">إدارة المحاضرات، الأكواد، ومتابعة الطلاب</p>
                        </div>
                        <button id="logout-btn" class="bg-rose-500/10 text-rose-400 px-4 py-2.5 rounded-xl text-xs font-bold hover:bg-rose-500 hover:text-white transition">تسجيل الخروج</button>
                    </header>

                    <!-- النشر والتوليد -->
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                            <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-plus-circle text-sky-400 ml-2"></i>نشر محاضرة جديدة</h3>
                            <form id="course-form" class="space-y-4">
                                <input type="text" id="title" required placeholder="عنوان المحاضرة (مثال: الباب الأول فيزياء)" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                                <input type="text" id="subject" required placeholder="اسم المادة" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                                <select id="academicYear" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                    <option value="first">الصف الأول الثانوي</option>
                                    <option value="second">الصف الثاني الثانوي</option>
                                    <option value="third">الصف الثالث الثانوي</option>
                                </select>
                                <input type="text" id="videoUrl" required placeholder="رابط يوتيوب للفيديو" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                                <textarea id="description" placeholder="وصف المحاضرة..." class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm h-20"></textarea>
                                <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">نشر المحاضرة</button>
                            </form>
                        </div>

                        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl flex flex-col justify-between">
                            <div>
                                <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-key text-amber-400 ml-2"></i>توليد أكواد تفعيل عشوائية وآمنة</h3>
                                <form id="code-form" class="space-y-4">
                                    <select id="codeCourseSelect" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                        <option value="">اختر المحاضرة المراد توليد كود لها</option>
                                    </select>
                                    <div class="flex gap-3">
                                        <input type="text" id="generatedCodeInput" readonly placeholder="الكود العشوائي سيظهر هنا" class="flex-1 bg-slate-950 border border-slate-800 rounded-xl p-3 text-amber-400 font-mono font-bold text-center text-sm" />
                                        <button type="button" id="generate-btn" class="bg-slate-800 hover:bg-slate-700 text-white font-bold px-4 py-3 rounded-xl text-sm transition">توليد عشوائي</button>
                                    </div>
                                    <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold py-3 rounded-xl transition">حفظ وتفعيل الكود في النظام</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- إدارة المحاضرات (تعديل، إيقاف، حذف) -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl space-y-4">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                            <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-book-open text-sky-400 ml-2"></i>إدارة المحاضرات المنشورة</h3>
                            <select id="filter-year" class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-white text-xs">
                                <option value="all">جميع السنوات الدراسية</option>
                                <option value="first">الصف الأول الثانوي</option>
                                <option value="second">الصف الثاني الثانوي</option>
                                <option value="third">الصف الثالث الثانوي</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="admin-courses-grid">
                            <p class="text-slate-500">جاري تحميل المحاضرات...</p>
                        </div>
                    </div>

                    <!-- إدارة الأكواد مع فلتر الحالة -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl space-y-4">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                            <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-list-check text-sky-400 ml-2"></i>إدارة الأكواد والتحكم فيها</h3>
                            <select id="filter-code-status" class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-white text-xs">
                                <option value="all">جميع الأكواد</option>
                                <option value="available">الأكواد المتاحة (الغير مستخدمة)</option>
                                <option value="used">الأكواد المستخدمة</option>
                                <option value="disabled">الأكواد المعطلة</option>
                            </select>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-right text-sm text-slate-300">
                                <thead class="bg-slate-950 text-slate-400 uppercase text-xs">
                                    <tr>
                                        <th class="p-3">الكود السري</th>
                                        <th class="p-3">يتبع المحاضرة</th>
                                        <th class="p-3">الحالة</th>
                                        <th class="p-3">مستخدم بواسطة</th>
                                        <th class="p-3">إجراءات التحكم</th>
                                    </tr>
                                </thead>
                                <tbody id="codes-table-body">
                                    <tr><td colspan="5" class="p-4 text-center text-slate-500">جاري تحميل الأكواد...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- إدارة الطلاب مع البحث السريع وتصدير Excel -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl space-y-4">
                        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                            <h3 class="text-lg font-bold text-white"><i class="fa-solid fa-users text-sky-400 ml-2"></i>سجل الطلاب الكامل</h3>
                            <div class="flex gap-3 w-full md:w-auto">
                                <input type="text" id="student-search" placeholder="ابحث باسم الطالب..." class="bg-slate-950 border border-slate-800 rounded-xl px-4 py-2 text-white text-xs flex-1 md:w-64" />
                                <button id="export-excel-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-2 transition">
                                    <i class="fa-solid fa-file-excel"></i> Excel
                                </button>
                            </div>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-right text-sm text-slate-300">
                                <thead class="bg-slate-950 text-slate-400 uppercase text-xs">
                                    <tr>
                                        <th class="p-3">الاسم الرباعي</th>
                                        <th class="p-3">الهواتف (طالب/أب/أم)</th>
                                        <th class="p-3">الرقم القومي</th>
                                        <th class="p-3">المدرسة / المحافظة</th>
                                        <th class="p-3">السنة</th>
                                        <th class="p-3">التحكم الأمني (حظر جهاز)</th>
                                    </tr>
                                </thead>
                                <tbody id="students-table-body">
                                    <tr><td colspan="6" class="p-4 text-center text-slate-500">جاري تحميل بيانات الطلاب...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

            document.getElementById('generate-btn').addEventListener('click', () => {
                const randomCode = Math.floor(100000 + Math.random() * 900000).toString();
                document.getElementById('generatedCodeInput').value = randomCode;
            });

            document.getElementById('course-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await addDoc(collection(db, "courses"), {
                    title: document.getElementById('title').value,
                    subject: document.getElementById('subject').value,
                    academicYear: document.getElementById('academicYear').value,
                    videoUrl: document.getElementById('videoUrl').value,
                    description: document.getElementById('description').value,
                    isActive: true,
                    createdAt: new Date()
                });
                showModal("تم بنجاح", "تم نشر المحاضرة بنجاح.");
                document.getElementById('course-form').reset();
                loadAdminData();
            });

            document.getElementById('code-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const courseId = document.getElementById('codeCourseSelect').value;
                const code = document.getElementById('generatedCodeInput').value;
                if (!code) { showModal("تنبيه", "الرجاء توليد كود أولاً!", "rose"); return; }

                await addDoc(collection(db, "activation_codes"), {
                    code: code,
                    courseId: courseId,
                    isUsed: false,
                    isDisabled: false,
                    usedBy: null,
                    createdAt: new Date()
                });
                showModal("تم بنجاح", "تم حفظ وتفعيل الكود بنجاح!");
                document.getElementById('code-form').reset();
                document.getElementById('generatedCodeInput').value = "";
                loadAdminData();
            });

            document.getElementById('edit-course-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('edit-course-id').value;
                await updateDoc(doc(db, "courses", id), {
                    title: document.getElementById('edit-title').value,
                    subject: document.getElementById('edit-subject').value,
                    academicYear: document.getElementById('edit-academicYear').value,
                    videoUrl: document.getElementById('edit-videoUrl').value,
                    description: document.getElementById('edit-description').value
                });
                closeEditModal();
                showModal("تم بنجاح", "تم تعديل بيانات المحاضرة بنجاح!");
                loadAdminData();
            });

            // ربط الفلاتر والبحث
            document.getElementById('filter-year').addEventListener('change', loadAdminData);
            document.getElementById('filter-code-status').addEventListener('change', loadAdminData);
            document.getElementById('student-search').addEventListener('input', loadAdminData);

            loadAdminData();
        }

        let allStudentsData = [];
        let coursesMap = {};
        let allCoursesList = [];
        let allCodesList = [];

        async function loadAdminData() {
            const coursesSnap = await getDocs(collection(db, "courses"));
            const select = document.getElementById('codeCourseSelect');
            const coursesGrid = document.getElementById('admin-courses-grid');
            const yearFilter = document.getElementById('filter-year')?.value || 'all';
            
            let selectHtml = '<option value="">اختر المحاضرة المراد توليد كود لها</option>';
            let coursesHtml = '';
            coursesMap = {};
            allCoursesList = [];

            coursesSnap.forEach(docSnap => {
                const c = docSnap.data();
                const id = docSnap.id;
                coursesMap[id] = { title: c.title, year: c.academicYear };
                allCoursesList.push({ id, ...c });

                selectHtml += `<option value="${id}">${c.title} (${c.subject})</option>`;

                if (yearFilter === 'all' || c.academicYear === yearFilter) {
                    const isActive = c.isActive !== false;
                    coursesHtml += `
                        <div class="bg-slate-950 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between">
                            <div>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs bg-sky-500/10 text-sky-400 px-2.5 py-1 rounded-lg font-bold">${c.subject}</span>
                                    <span class="text-xs px-2 py-0.5 rounded-md font-bold ${isActive ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}">
                                        ${isActive ? 'نشطة' : 'متوقفة'}
                                    </span>
                                </div>
                                <h4 class="text-base font-bold text-white">${c.title}</h4>
                                <p class="text-slate-400 text-xs mt-1">السنة: ${c.academicYear === 'third' ? 'الثالث الثانوي' : c.academicYear === 'second' ? 'الثاني الثانوي' : 'الأول الثانوي'}</p>
                            </div>
                            <div class="mt-4 grid grid-cols-3 gap-2">
                                <button onclick="window.openEditModal('${id}', '${c.title}', '${c.subject}', '${c.academicYear}', '${c.videoUrl}', '${c.description}')" class="bg-sky-500/10 text-sky-400 text-xs py-2 rounded-xl font-bold hover:bg-sky-500 hover:text-slate-950 transition">تعديل</button>
                                <button onclick="window.toggleCourseStatus('${id}', ${isActive})" class="bg-slate-800 hover:bg-slate-700 text-xs py-2 rounded-xl font-bold transition">
                                    ${isActive ? 'إيقاف' : 'تشغيل'}
                                </button>
                                <button onclick="window.deleteCourse('${id}')" class="bg-rose-500/10 text-rose-400 text-xs py-2 rounded-xl font-bold hover:bg-rose-500 hover:text-white transition">حذف</button>
                            </div>
                        </div>
                    `;
                }
            });
            if(select) select.innerHTML = selectHtml;
            if(coursesGrid) coursesGrid.innerHTML = coursesHtml || '<p class="text-slate-500 col-span-full">لا توجد محاضرات مطابقة</p>';

            // تحميل الطلاب أولاً عشان نقدر نربط الـ ID بالاسم في الأكواد
            const usersSnap = await getDocs(collection(db, "users"));
            allStudentsData = [];
            let studentsMap = {};
            usersSnap.forEach(docSnap => {
                const st = docSnap.data();
                const stId = docSnap.id;
                allStudentsData.push({ id: stId, ...st });
                studentsMap[stId] = `${st.fullName || 'بدون اسم'} / ${st.studentPhone || '-'}`;
            });

            // تحميل الأكواد مع الفلتر
            const codesSnap = await getDocs(collection(db, "activation_codes"));
            const codesTbody = document.getElementById('codes-table-body');
            const codeStatusFilter = document.getElementById('filter-code-status')?.value || 'all';
            let codesHtml = '';

            codesSnap.forEach(docSnap => {
                const codeObj = docSnap.data();
                const codeId = docSnap.id;
                const courseInfo = coursesMap[codeObj.courseId] || { title: 'محاضرة محذوفة', year: '-' };
                const yearText = courseInfo.year === 'third' ? 'الثالث الثانوي' : courseInfo.year === 'second' ? 'الثاني الثانوي' : 'الأول الثانوي';
                const courseLabel = `${courseInfo.title} / ${yearText}`;
                
                const isDisabled = codeObj.isDisabled || false;
                const isUsed = codeObj.isUsed || false;

                let matchesFilter = true;
                if (codeStatusFilter === 'available' && (isUsed || isDisabled)) matchesFilter = false;
                if (codeStatusFilter === 'used' && !isUsed) matchesFilter = false;
                if (codeStatusFilter === 'disabled' && !isDisabled) matchesFilter = false;

                if (matchesFilter) {
                    const studentDetails = codeObj.usedBy ? (studentsMap[codeObj.usedBy] || codeObj.usedBy) : 'لا يوجد';
                    codesHtml += `
                        <tr class="border-b border-slate-800/60 hover:bg-slate-800/30">
                            <td class="p-3 font-mono text-amber-400 font-bold">${codeObj.code}</td>
                            <td class="p-3 text-xs text-sky-300 font-semibold">${courseLabel}</td>
                            <td class="p-3">
                                ${isUsed ? '<span class="bg-rose-500/10 text-rose-400 px-2.5 py-1 rounded-lg text-xs font-bold">مستخدم</span>' : (isDisabled ? '<span class="bg-amber-500/10 text-amber-400 px-2.5 py-1 rounded-lg text-xs font-bold">معطل</span>' : '<span class="bg-emerald-500/10 text-emerald-400 px-2.5 py-1 rounded-lg text-xs font-bold">متاح</span>')}
                            </td>
                            <td class="p-3 text-xs text-slate-300">${studentDetails}</td>
                            <td class="p-3 flex gap-2">
                                <button onclick="window.toggleCodeStatus('${codeId}', ${isDisabled})" class="bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded-lg text-xs font-bold transition">
                                    ${isDisabled ? 'تفعيل' : 'تعطيل'}
                                </button>
                                <button onclick="window.deleteCode('${codeId}')" class="bg-rose-500/10 text-rose-400 px-3 py-1 rounded-lg text-xs font-bold hover:bg-rose-500 hover:text-white transition">حذف</button>
                            </td>
                        </tr>
                    `;
                }
            });
            if(codesTbody) codesTbody.innerHTML = codesHtml || '<tr><td colspan="5" class="p-4 text-center text-slate-500">لا توجد أكواد مطابقة للفلتر</td></tr>';

            // عرض الطلاب مع البحث بالاسم
            const studentsTbody = document.getElementById('students-table-body');
            const searchTerm = document.getElementById('student-search')?.value.toLowerCase() || '';
            let studentsHtml = '';

            allStudentsData.forEach(st => {
                const fullName = st.fullName || '';
                if (searchTerm === '' || fullName.toLowerCase().includes(searchTerm)) {
                    const isDeviceBlocked = st.deviceBlocked || false;
                    studentsHtml += `
                        <tr class="border-b border-slate-800/60 hover:bg-slate-800/30">
                            <td class="p-3 font-bold text-white">${fullName}</td>
                            <td class="p-3 text-xs">
                                طالب: <span class="font-mono text-sky-400">${st.studentPhone || '-'}</span><br>
                                أب: <span class="font-mono">${st.fatherPhone || '-'}</span> | أم: <span class="font-mono">${st.motherPhone || '-'}</span>
                            </td>
                            <td class="p-3 font-mono text-xs">${st.nationalId || '-'}</td>
                            <td class="p-3 text-xs">${st.school || '-'} (${st.governorate || '-'})</td>
                            <td class="p-3 text-xs font-bold">${st.academicYear === 'third' ? 'الثالث' : st.academicYear === 'second' ? 'الثاني' : 'الأول'} الثانوي</td>
                            <td class="p-3 flex items-center gap-2">
                                ${isDeviceBlocked ? '<span class="text-rose-400 text-xs font-bold">الجهاز محظور</span>' : '<span class="text-emerald-400 text-xs font-bold">الطهاز مسموح</span>'}
                                <button onclick="window.toggleDeviceBlock('${st.id}', ${isDeviceBlocked})" class="bg-slate-800 hover:bg-slate-700 text-xs px-3 py-1.5 rounded-lg font-bold transition">
                                    ${isDeviceBlocked ? 'رفع الحظر عن الجهاز' : 'حظر الجهاز'}
                                </button>
                            </td>
                        </tr>
                    `;
                }
            });
            if(studentsTbody) studentsTbody.innerHTML = studentsHtml || '<tr><td colspan="6" class="p-4 text-center text-slate-500">لا توجد نتائج مطابقة للبحث</td></tr>';
        }

        window.openEditModal = function(id, title, subject, academicYear, videoUrl, description) {
            document.getElementById('edit-course-id').value = id;
            document.getElementById('edit-title').value = title;
            document.getElementById('edit-subject').value = subject;
            document.getElementById('edit-academicYear').value = academicYear;
            document.getElementById('edit-videoUrl').value = videoUrl;
            document.getElementById('edit-description').value = description;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        window.toggleCourseStatus = async function(id, currentStatus) {
            await updateDoc(doc(db, "courses", id), { isActive: !currentStatus });
            loadAdminData();
        };

        window.toggleCodeStatus = async function(id, currentStatus) {
            await updateDoc(doc(db, "activation_codes", id), { isDisabled: !currentStatus });
            loadAdminData();
        };

        window.deleteCourse = async function(id) {
            showModal("تأكيد الحذف", "هل أنت متأكد من حذف هذه المحاضرة نهائياً؟", "rose", async () => {
                await deleteDoc(doc(db, "courses", id));
                loadAdminData();
            });
        };

        window.deleteCode = async function(id) {
            showModal("تأكيد الحذف", "هل أنت متأكد من حذف هذا الكود نهائياً؟", "rose", async () => {
                await deleteDoc(doc(db, "activation_codes", id));
                loadAdminData();
            });
        };

        // حظر جهاز الطالب أمنياً
        window.toggleDeviceBlock = async function(userId, currentStatus) {
            await updateDoc(doc(db, "users", userId), { deviceBlocked: !currentStatus });
            loadAdminData();
        };

        // تصدير Excel باستخدام Blob المحدث والسليم
        document.getElementById('export-excel-btn')?.addEventListener('click', () => {
            if (allStudentsData.length === 0) { showModal("تنبيه", "لا توجد بيانات طلاب لتصديرها!", "rose"); return; }
            let csvContent = "الاسم الرباعي,هاتف الطالب,هاتف الأب,هاتف الأم,الرقم القومي,المدرسة,المحافظة,السنة الدراسية\n";
            allStudentsData.forEach(st => {
                csvContent += `"${st.fullName || ''}","${st.studentPhone || ''}","${st.fatherPhone || ''}","${st.motherPhone || ''}","${st.nationalId || ''}","${st.school || ''}","${st.governorate || ''}","${st.academicYear || ''}"\n`;
            });
            const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "students_database.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
