<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدرس - إدارة الأكواد والكورسات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <p class="text-slate-400">جاري التحميل...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqapVeFxYyLJWryfqJrwBBmaIFcsCLn-w",
            authDomain: "educational-platform-f5e7e.firebaseapp.com",
            projectId: "educational-platform-f5e7e",
            storageBucket: "educational-platform-f5e7e.firebasestorage.app",
            messagingSenderId: "284103839814",
            appId: "1:284103839814:web:9b6abd761a585c46f03a47"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appDiv = document.getElementById('app');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                renderAdminDashboard(user);
            } else {
                renderLogin();
            }
        });

        function renderLogin() {
            appDiv.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-4">
                    <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                        <h2 class="text-2xl font-bold text-white mb-6 text-center">دخول المدرس</h2>
                        <form id="login-form" class="space-y-4">
                            <input type="email" id="email" required placeholder="البريد الإلكتروني" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="password" id="password" required placeholder="كلمة المرور" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <button type="submit" class="w-full bg-sky-500 text-slate-950 font-bold py-3 rounded-xl">تسجيل الدخول</button>
                        </form>
                    </div>
                </div>
            `;
            document.getElementById('login-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value);
            });
        }

        async function renderAdminDashboard(user) {
            appDiv.innerHTML = `
                <div class="min-h-screen p-6 md:p-10 max-w-6xl mx-auto">
                    <header class="flex justify-between items-center mb-8 pb-6 border-b border-slate-800">
                        <div>
                            <h1 class="text-2xl font-black text-white">لوحة تحكم المعلم</h1>
                            <p class="text-slate-400 text-sm">إدارة المحاضرات وتوليد أكواد التفعيل</p>
                        </div>
                        <button id="logout-btn" class="bg-rose-500/10 text-rose-400 px-4 py-2 rounded-xl text-sm font-bold">تسجيل الخروج</button>
                    </header>

                    <!-- إضافة كورس -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 mb-8 shadow-xl">
                        <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-plus-circle text-sky-400 ml-2"></i>إضافة محاضرة جديدة</h3>
                        <form id="course-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="title" required placeholder="عنوان المحاضرة (مثال: الباب الأول فيزياء)" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <input type="text" id="subject" required placeholder="اسم المادة (فيزياء، كيمياء...)" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <select id="academicYear" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                <option value="first">الصف الأول الثانوي</option>
                                <option value="second">الصف الثاني الثانوي</option>
                                <option value="third">الصف الثالث الثانوي</option>
                            </select>
                            <input type="text" id="videoUrl" required placeholder="رابط يوتيوب (Embed أو عادي)" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <textarea id="description" placeholder="وصف المحاضرة..." class="md:col-span-2 bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm h-24"></textarea>
                            <button type="submit" class="md:col-span-2 bg-sky-500 hover:bg-sky-400 text-slate-950 font-extrabold py-3 rounded-xl transition">نشر المحاضرة</button>
                        </form>
                    </div>

                    <!-- توليد أكواد التفعيل -->
                    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 mb-8 shadow-xl">
                        <h3 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-key text-amber-400 ml-2"></i>توليد كود تفعيل لمدرس / محاضرة</h3>
                        <form id="code-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <select id="codeCourseSelect" required class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm">
                                <option value="">اختر المحاضرة المطلوبة</option>
                            </select>
                            <input type="text" id="customCode" required placeholder="الكود (مثال: PHYS-9921)" class="bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-sm" />
                            <button type="submit" class="bg-amber-500 hover:bg-amber-400 text-slate-950 font-extrabold py-3 rounded-xl transition">إنشاء الكود وإرساله للنظام</button>
                        </form>
                    </div>

                    <!-- قائمة الكورسات والأكواد -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="admin-courses-list"></div>
                </div>
            `;

            document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

            // إضافة كورس
            document.getElementById('course-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                await addDoc(collection(db, "courses"), {
                    title: document.getElementById('title').value,
                    subject: document.getElementById('subject').value,
                    academicYear: document.getElementById('academicYear').value,
                    videoUrl: document.getElementById('videoUrl').value,
                    description: document.getElementById('description').value,
                    createdAt: new Date()
                });
                alert("تم بنجاح نشر المحاضرة!");
                document.getElementById('course-form').reset();
                loadAdminData();
            });

            // توليد كود
            document.getElementById('code-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const courseId = document.getElementById('codeCourseSelect').value;
                const code = document.getElementById('customCode').value.trim();

                await addDoc(collection(db, "activation_codes"), {
                    code: code,
                    courseId: courseId,
                    isUsed: false,
                    usedBy: null
                });
                alert("تم توليد الكود بنجاح!");
                document.getElementById('code-form').reset();
            });

            loadAdminData();
        }

        async function loadAdminData() {
            const list = document.getElementById('admin-courses-list');
            const select = document.getElementById('codeCourseSelect');
            const snapshot = await getDocs(collection(db, "courses"));
            
            let html = '';
            let selectHtml = '<option value="">اختر المحاضرة المطلوبة</option>';

            snapshot.forEach((docSnap) => {
                const c = docSnap.data();
                const id = docSnap.id;
                selectHtml += `<option value="${id}">${c.title} (${c.subject})</option>`;
                html += `
                    <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 flex flex-col justify-between">
                        <div>
                            <span class="text-xs bg-sky-500/10 text-sky-400 px-3 py-1 rounded-full font-bold">${c.subject}</span>
                            <h4 class="text-base font-bold text-white mt-3">${c.title}</h4>
                            <p class="text-slate-400 text-xs mt-1">السنة: ${c.academicYear}</p>
                        </div>
                        <button onclick="window.delCourse('${id}')" class="mt-4 bg-rose-500/10 text-rose-400 font-bold py-2 rounded-xl text-xs hover:bg-rose-500 hover:text-white transition">حذف المحاضرة</button>
                    </div>
                `;
            });
            list.innerHTML = html || '<p class="text-slate-400">لا توجد كورسات مضافة</p>';
            select.innerHTML = selectHtml;
        }

        window.delCourse = async function(id) {
            if(confirm("هل أنت متأكد من الحذف؟")) {
                await deleteDoc(doc(db, "courses", id));
                loadAdminData();
            }
        };
    </script>
</body>
</html>
